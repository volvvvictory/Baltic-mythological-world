<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baltic Mythological World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #b4c8cc; font-family: sans-serif; overflow: hidden; }
    #vc { width: 100vw; height: 100vh; display: block; }
    #ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
    }
    button {
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; padding: 8px 18px; border-radius: 20px; cursor: pointer;
      font-size: 14px; backdrop-filter: blur(6px); transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.32); }
    #label {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 0.08em;
      text-transform: uppercase; pointer-events: none;
    }
    #walk-overlay {
      display: none; position: fixed; inset: 0;
      align-items: center; justify-content: center; flex-direction: column; gap: 12px;
      background: rgba(0,0,0,0.45);
    }
    #walk-overlay.visible { display: flex; }
    #walk-overlay p { color: #fff; font-size: 15px; letter-spacing: 0.06em; text-align: center; line-height: 1.8; }
    #crosshair {
      display: none; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 20px; height: 20px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content:''; position: absolute; background: rgba(255,255,255,0.75);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    #crosshair.visible { display: block; }
    #walk-hint {
      display: none; position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 0.05em;
      pointer-events: none; text-align: center;
    }
    #walk-hint.visible { display: block; }
    #lore-panel {
      display: none; position: fixed; bottom: 80px; left: 24px;
      width: 300px; max-height: 70vh; overflow-y: auto;
      background: rgba(10,12,20,0.88); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px; padding: 1.2rem 1.4rem; color: #fff;
      backdrop-filter: blur(12px); transition: opacity 0.2s;
    }
    #lore-panel.visible { display: block; }
    #lore-panel .lore-world {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,220,100,0.75); margin-bottom: 6px;
    }
    #lore-panel .lore-title {
      font-size: 17px; font-weight: 500; margin-bottom: 10px; line-height: 1.3;
    }
    #lore-panel .lore-text {
      font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.78);
    }
    #lore-panel .lore-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: rgba(255,255,255,0.45);
      font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
    }
    #lore-panel .lore-close:hover { color: #fff; background: none; }
    #hover-tag {
      display: none; position: fixed; pointer-events: none;
      background: rgba(10,12,20,0.82); border: 1px solid rgba(255,220,100,0.4);
      color: rgba(255,220,100,0.95); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 5px 10px; border-radius: 6px;
      backdrop-filter: blur(8px); white-space: nowrap;
      transform: translate(14px, -50%);
    }
  </style>
</head>
<body>
  <div id="vc"></div>
  <div id="label">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
  <div id="ui">
    <button onclick="goUpper()">Sky world</button>
    <button onclick="goMiddle()">Hillfort</button>
    <button onclick="goLower()">Underworld</button>
    <button onclick="goAll()">All three</button>
    <button onclick="enterWalk()" id="walkBtn">Walk inside</button>
  </div>
  <div id="lore-panel">
    <button class="lore-close" onclick="closeLore()">✕</button>
    <div class="lore-world" id="lore-world"></div>
    <div class="lore-title" id="lore-title"></div>
    <div class="lore-text" id="lore-text"></div>
  </div>
  <div id="hover-tag"></div>
  <div id="walk-overlay">
    <p>WASD — move &nbsp;·&nbsp; Mouse — look<br>Click to start &nbsp;·&nbsp; Esc to exit</p>
    <button onclick="requestLock()">Click to enter</button>
  </div>
  <div id="crosshair"></div>
  <div id="walk-hint">WASD to move &nbsp;·&nbsp; Esc to exit walk mode</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function(){
    var el = document.getElementById('vc');
    var W = window.innerWidth, H = window.innerHeight;

    var rend = new THREE.WebGLRenderer({antialias:true});
    rend.setSize(W, H);
    rend.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    rend.shadowMap.enabled = true;
    rend.shadowMap.type = THREE.VSMShadowMap;
    rend.toneMapping = THREE.ACESFilmicToneMapping;
    rend.toneMappingExposure = 0.55;
    rend.outputEncoding = THREE.sRGBEncoding;
    rend.setClearColor(0xb4c8cc, 1);
    el.appendChild(rend.domElement);

    var scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xb4c8cc, 55, 110);

    var cam = new THREE.PerspectiveCamera(50, W/H, 0.1, 300);
    var th=0.9, ph=1.05, rd=62, tTh=0.9, tPh=1.05, tRd=62;
    var lookY=5, tLookY=5;

    function updCam() {
      cam.position.set(
        rd*Math.sin(ph)*Math.sin(th),
        rd*Math.cos(ph),
        rd*Math.sin(ph)*Math.cos(th)
      );
      cam.lookAt(0, lookY, 0);
    }
    updCam();

    window.goAll    = function(){ tTh=0.9;  tPh=1.05; tRd=62; tLookY=5;   };
    window.goUpper  = function(){ tTh=0.7;  tPh=0.6;  tRd=40; tLookY=24;  };
    window.goMiddle = function(){ tTh=0.85; tPh=0.88; tRd=26; tLookY=3;   };
    window.goLower  = function(){ tTh=0.5;  tPh=1.35; tRd=30; tLookY=-14; };

    window.addEventListener('resize', function(){
      W = window.innerWidth; H = window.innerHeight;
      cam.aspect = W/H; cam.updateProjectionMatrix();
      rend.setSize(W, H);
    });

    function fmf(c) {
      return new THREE.MeshPhongMaterial({color:c, flatShading:true, shininess:0});
    }
    function bm(c, op) {
      var m = new THREE.MeshBasicMaterial({color:c});
      if (op !== undefined) { m.transparent=true; m.opacity=op; }
      return m;
    }

    // ── LIGHTS ──────────────────────────────────────────
    scene.add(new THREE.HemisphereLight(0x4dc1ff, 0xffdca8, 0.5));
    scene.add(new THREE.AmbientLight(0xa68195, 0.35));
    var sun = new THREE.DirectionalLight(0xffd1d1, 3.5);
    sun.position.set(14, 18, 10); sun.castShadow = true;
    sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left=-28; sun.shadow.camera.right=28;
    sun.shadow.camera.top=28; sun.shadow.camera.bottom=-28;
    sun.shadow.radius = 3;
    scene.add(sun);

    var fireL  = new THREE.PointLight(0xffffff, 4.0, 34); fireL.position.set(0,-16,0);   scene.add(fireL);
    var waterL = new THREE.PointLight(0xcccccc, 2.5, 28); waterL.position.set(0,-17,0);  scene.add(waterL);
    var rL1    = new THREE.PointLight(0xaaaaaa, 1.8, 20); rL1.position.set(7,-14,4);     scene.add(rL1);
    var rL2    = new THREE.PointLight(0xbbbbbb, 1.8, 20); rL2.position.set(-7,-14,-4);   scene.add(rL2);
    var eL1    = new THREE.PointLight(0xffffff, 1.5, 12); eL1.position.set(5,-19,5);     scene.add(eL1);
    var eL2    = new THREE.PointLight(0xdddddd, 1.2, 10); eL2.position.set(-6,-20,-4);   scene.add(eL2);
    var fpL    = new THREE.PointLight(0xff8800, 2.5, 10); fpL.position.set(0,5.5,0);     scene.add(fpL);
    var skyL   = new THREE.PointLight(0xffd700, 1.8, 60); skyL.position.set(0,30,0);     scene.add(skyL);

    // ── LORE ────────────────────────────────────────────
    var clickables = [];

    function tag(mesh, world, title, text) {
      if (!mesh) return;
      mesh.userData.lore = {world:world, title:title, text:text};
      clickables.push(mesh);
    }

    var loreData = {
      tree: {
        world: 'The World Tree — Axis Mundi',
        title: 'The Sacred Oak',
        text: 'At the centre of the cosmos stood the World Tree — a great oak with nine branches connecting sky, earth, and the underworld. A piece of a lightning-struck oak was sacred, kept as a hereditary charm for household prosperity. If a tree breaks or falls in a dream, someone of the family will die.\n\nThe historian Hennenberger described fire offerings at Romove (Rāmava — "a calm, peaceful place") before a great oak with cult images of three deities carved into its trunk, surrounded by an angular curtain. Cutting trees in this sacred grove was forbidden to outsiders.'
      },
      hillfort: {
        world: 'Middle World — Žemė',
        title: 'The Hillfort',
        text: 'Baltic tribes built hillforts on elevated mounds as fortified settlements. Wooden palisades of sharpened logs surrounded the plateau. Longhouses inside held families, stores, and workshops. The hillfort was both a refuge in times of raid and a gathering place for the community.\n\nSome tribes instead built on lake islands — "lake castles" (ezerpils). The Āraiši Lake Castle in Vidzeme is the best-preserved example: wooden houses on stilts above an artificial island, surrounded by defensive walls, with evidence of dwellings, workshops, and storage.'
      },
      longhouse: {
        world: 'Middle World — Žemė',
        title: 'The Longhouse',
        text: 'Families lived in longhouses — rectangular wooden structures shared by an extended household. A central hearth provided warmth and light. When a child was born, a tree was planted in the backyard, becoming their peer and growing alongside them — gradually sanctified as a bond with the ancestor resting beneath it.\n\nTrees carried gender in Latvian folklore: oak, birch, ash and willow were masculine; linden, pine, spruce, bird-cherry and apple were feminine.'
      },
      gate: {
        world: 'Middle World — Žemė',
        title: 'The Gate Tower',
        text: 'The gate was the most defended point of any hillfort — the place where the community controlled who entered and who did not. In Baltic tradition, thresholds and boundaries held strong symbolic power, marking the edge between the familiar and the unknown.\n\nRaids by neighbouring tribes and Viking sea-farers drove communities to build these fortifications on high ground or water, making the gate both a physical and symbolic boundary between safety and the outside world.'
      },
      underworld: {
        world: 'Lower World — Velnias Realm',
        title: 'The Underworld',
        text: 'The chthonic world below the earth was home to underground beings and the souls of the dead. Velnias (or Vels) was the god of the underworld, cattle, and the dead — the great antagonist of the sky god Dievs.\n\nThe afterlife was not fixed in one place. In different mythological ideas, the realm of the dead lay beneath the earth or far in the west, at the end of the Sun\'s daily path across the sky. The World Tree\'s roots reached deep into this dark realm, drawing up its hidden waters.'
      },
      portal: {
        world: 'The Cosmic Boundary',
        title: 'The Portal Ring',
        text: 'Where the World Tree passes through each realm, a boundary is formed — a threshold between worlds. These liminal zones were places of great power and danger in Baltic belief.\n\nThe Sun goddess Saule was said to travel the sky each day on a chariot, then descend below the horizon into the realm of the dead at night, passing through just such a boundary. At dusk and dawn, the worlds briefly touched.'
      },
      canopy: {
        world: 'Upper World — Dangus',
        title: 'The Sky Realm',
        text: 'The world of sky deities sat above all others, reached through the crown of the World Tree. Dievs, the sky god, held court here — a calm, orderly deity who rode across the heavens. Saule, the Sun goddess, wove golden threads and lit the world below.\n\nThe cosmic mountain or heavenly tree was sometimes imagined as a long beanstalk, a mountain of glass, or the great oak itself — its nine branches holding the nine celestial bodies. Gods were said to walk among the branches, and the souls of the heroic dead rested here as birds in the leaves.'
      }
    };

    // ── TRUNK (world tree / oak) ─────────────────────────
    var barkDark = 0x3a2810, barkMid = 0x4a3418, barkLight = 0x5a4020;

    // root flare at base — wide cone suggesting exposed roots
    var rootFlare = new THREE.Mesh(new THREE.CylinderGeometry(0.65,1.6,2.0,8,1), fmf(0x2e2010));
    rootFlare.position.y=-17; rootFlare.castShadow=true; scene.add(rootFlare);

    // main trunk — oak-brown, slightly wider than before
    [[0.55,0.75,7,barkDark,-17],[0.42,0.55,11,barkMid,-7.5]].forEach(function(s,si){
      var m = new THREE.Mesh(new THREE.CylinderGeometry(s[0],s[1],s[2],7,1), fmf(s[3]));
      m.position.y = s[4]+s[2]/2; m.castShadow=true; scene.add(m);
      if (si===1) tag(m, loreData.tree.world, loreData.tree.title, loreData.tree.text);
    });

    // gnarled sub-trunks alongside main — give an ancient twisted look
    [[ 0.18, 0.0,  0.12, 14, -10],
     [-0.14, 0.0, -0.10, 12,  -9],
     [ 0.0,  0.10, 0.0,  10, -11]].forEach(function(g){
      var gt=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.20,g[3],6,1),fmf(barkDark));
      gt.position.set(g[0],g[4]+g[3]/2,g[2]); gt.rotation.z=g[1]*0.3; gt.castShadow=true; scene.add(gt);
    });

    // bark bump details along the visible mid-trunk
    for (var i=0; i<14; i++) {
      var ba=i/14*Math.PI*2, by=-14+i*2.2;
      var bump=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.22,0.10),fmf(i%2===0?barkDark:barkMid));
      bump.position.set(Math.cos(ba)*0.48,by,Math.sin(ba)*0.48); bump.rotation.y=ba; scene.add(bump);
    }

    // upper trunk — solid from y=11, oak brown
    var solidTrunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.34,7.5,7,1), fmf(barkLight));
    solidTrunk.position.y = 11.0 + 7.5/2; solidTrunk.castShadow=true; scene.add(solidTrunk);

    // large spreading oak branches from upper trunk
    var branchDefs = [
      // [fromX,fromY,fromZ, toX,toY,toZ, r]
      [ 0,13, 0,   3.5,16, 2.0,  0.18],
      [ 0,13, 0,  -3.0,15, 2.5,  0.16],
      [ 0,13, 0,   2.5,15,-3.0,  0.16],
      [ 0,13, 0,  -2.0,14,-2.5,  0.14],
      [ 0,15, 0,   4.5,17,-1.0,  0.12],
      [ 0,15, 0,  -4.0,17, 1.5,  0.12],
      [ 0,15, 0,   1.0,17, 4.0,  0.11],
      [ 0,15, 0,  -1.5,16,-4.5,  0.11],
    ];
    branchDefs.forEach(function(b){
      var from=new THREE.Vector3(b[0],b[1],b[2]);
      var to=new THREE.Vector3(b[3],b[4],b[5]);
      var dir=new THREE.Vector3().subVectors(to,from);
      var len=dir.length();
      var mid=new THREE.Vector3().addVectors(from,to).multiplyScalar(0.5);
      var curve=new THREE.CatmullRomCurve3([from, mid.clone().add(new THREE.Vector3((Math.random()-0.5)*1.5,0,(Math.random()-0.5)*1.5)), to]);
      var geo=new THREE.TubeGeometry(curve,10,b[6],6,false);
      var mesh=new THREE.Mesh(geo,fmf(barkLight)); mesh.castShadow=true; scene.add(mesh);
    });

    // fade-in segments where trunk materialises above the hillfort
    var trunkFade = [
      [0.31,0.34, 10.5, 11.0, 0.85],
      [0.29,0.31, 10.0, 10.5, 0.65],
      [0.27,0.29,  9.5, 10.0, 0.42],
      [0.25,0.27,  9.0,  9.5, 0.22],
      [0.24,0.25,  8.5,  9.0, 0.10],
      [0.23,0.24,  8.0,  8.5, 0.04],
      [0.22,0.23,  7.5,  8.0, 0.01],
    ];
    trunkFade.forEach(function(f){
      var h=f[3]-f[2];
      var mat=new THREE.MeshPhongMaterial({color:barkMid,transparent:true,opacity:f[4],flatShading:true,depthWrite:false});
      var seg=new THREE.Mesh(new THREE.CylinderGeometry(f[0],f[1],h,7,1),mat);
      seg.position.y=f[2]+h/2; scene.add(seg);
    });
    // dissolve corona where trunk meets the hillfort — additive glow widens toward fire
    var dissolveGeo = new THREE.CylinderGeometry(2.2, 0.5, 7, 10, 1, true);
    var dissolveMat = new THREE.MeshBasicMaterial({color:0x88ffcc, transparent:true, opacity:0.13, side:THREE.DoubleSide, depthWrite:false, blending:THREE.AdditiveBlending});
    var dissolveMesh = new THREE.Mesh(dissolveGeo, dissolveMat);
    dissolveMesh.position.y = 1.0; scene.add(dissolveMesh);
    // soft outer ring
    var dissolveGeo2 = new THREE.CylinderGeometry(3.8, 0.4, 5, 10, 1, true);
    var dissolveMat2 = new THREE.MeshBasicMaterial({color:0x44ddaa, transparent:true, opacity:0.07, side:THREE.DoubleSide, depthWrite:false, blending:THREE.AdditiveBlending});
    var dissolveMesh2 = new THREE.Mesh(dissolveGeo2, dissolveMat2);
    dissolveMesh2.position.y = 2.0; scene.add(dissolveMesh2);
    [0, 18].forEach(function(y, i){
      var r = new THREE.Mesh(new THREE.TorusGeometry(1.1,0.14,6,24), bm(i===0?0x00ffcc:0xffd700, 0.85));
      r.position.y = y; scene.add(r);
      tag(r, loreData.portal.world, loreData.portal.title, loreData.portal.text);
    });

    // ── UNDERWORLD ──────────────────────────────────────
    var UW = -18;
    // ground layers — near-black to dark gray
    [[16,0.8,0x0a0a0a],[13,0.7,0x111111],[10,0.6,0x080808]].forEach(function(d,i){
      var layer = new THREE.Mesh(new THREE.CylinderGeometry(d[0]-i,d[0],d[1],10,1), fmf(d[2]));
      layer.position.y = UW-0.4-i*0.5; scene.add(layer);
    });
    // flat ground plane — black
    var uwGround = new THREE.Mesh(new THREE.CircleGeometry(16,14), fmf(0x0d0d0d));
    uwGround.rotation.x=-Math.PI/2; uwGround.position.y=UW-0.02; scene.add(uwGround);

    // water/void pool — dark mirror, bright white emissive shimmer
    var waterMat = new THREE.MeshPhongMaterial({
      color:0x111111, emissive:0xffffff, emissiveIntensity:0.08,
      flatShading:true, shininess:200, transparent:true, opacity:0.95
    });
    var waterMesh = new THREE.Mesh(new THREE.CircleGeometry(7,14), waterMat);
    waterMesh.rotation.x=-Math.PI/2; waterMesh.position.y=UW+0.05; scene.add(waterMesh);
    tag(waterMesh, loreData.underworld.world, loreData.underworld.title, loreData.underworld.text);

    // white cracks / seams in ground
    [[5,4],[-5,-3],[3,8],[-7,2],[5,-7],[-3,6],[7,-3]].forEach(function(p){
      var em = new THREE.Mesh(new THREE.CircleGeometry(0.45,7), bm(0xffffff,0.7));
      em.rotation.x=-Math.PI/2; em.position.set(p[0],UW+0.08,p[1]); scene.add(em);
      var halo = new THREE.Mesh(new THREE.CircleGeometry(1.0,7), bm(0xffffff,0.12));
      halo.rotation.x=-Math.PI/2; halo.position.set(p[0],UW+0.07,p[1]); scene.add(halo);
    });

    // horizon fog ring — pale white mist at edge
    var horizonRing = new THREE.Mesh(new THREE.RingGeometry(13,17,32), new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.06,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide}));
    horizonRing.rotation.x=-Math.PI/2; horizonRing.position.y=UW+0.1; scene.add(horizonRing);

    // stone dome structures at perimeter — dark gray
    [[0.4,13],[1.3,14],[2.2,12],[3.5,13],[4.8,14],[5.6,12]].forEach(function(d){
      var dx=Math.cos(d[0])*d[1], dz=Math.sin(d[0])*d[1];
      var dome=new THREE.Mesh(new THREE.SphereGeometry(1.4+Math.random()*0.6,8,6,0,Math.PI*2,0,Math.PI/2),fmf(0x222222));
      dome.position.set(dx,UW+0.1,dz); scene.add(dome);
      var domeGlow=new THREE.Mesh(new THREE.SphereGeometry(1.9,8,6,0,Math.PI*2,0,Math.PI/2),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.04,depthWrite:false,blending:THREE.AdditiveBlending}));
      domeGlow.position.set(dx,UW+0.1,dz); scene.add(domeGlow);
    });

    // tall plants — black silhouettes
    function makeUWPlant(px, pz, h) {
      var stalk=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.10,h,5,1),fmf(0x111111));
      stalk.position.set(px,UW+h/2,pz); scene.add(stalk);
      for (var i=0; i<7; i++) {
        var la=i/7*Math.PI*2;
        var leaf=new THREE.Mesh(new THREE.ConeGeometry(0.22,1.8,4,1),fmf(0x181818));
        leaf.rotation.z=Math.PI*0.38; leaf.rotation.y=la;
        leaf.position.set(px+Math.cos(la)*0.85,UW+0.5,pz+Math.sin(la)*0.85); scene.add(leaf);
      }
      for (var i=0; i<5; i++) {
        var fa=i/5*Math.PI*2, fr=0.28;
        var fl=new THREE.Mesh(new THREE.SphereGeometry(0.16,5,4),fmf(i%2===0?0x333333:0x222222));
        fl.position.set(px+Math.cos(fa)*fr,UW+h+0.2,pz+Math.sin(fa)*fr); scene.add(fl);
      }
    }
    makeUWPlant(8, 4, 6.5);
    makeUWPlant(-6, 7, 4.5);
    makeUWPlant(4, -9, 5.0);

    // dense low shrubs — dark gray lumps
    for (var i=0; i<28; i++) {
      var sa=i/28*Math.PI*2, sr=8+Math.random()*5;
      var sx=Math.cos(sa)*sr, sz=Math.sin(sa)*sr;
      var sh=0.4+Math.random()*0.6;
      var shrub=new THREE.Mesh(new THREE.SphereGeometry(sh,5,4),fmf(i%2===0?0x1a1a1a:0x141414));
      shrub.scale.y=0.5; shrub.position.set(sx,UW+sh*0.25,sz); scene.add(shrub);
    }

    // soul figure — white silhouette
    var soulX=5, soulZ=2;
    [[-0.12,0],[0.12,0]].forEach(function(l){
      var leg=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.10,1.0,5,1),fmf(0xdddddd));
      leg.position.set(soulX+l[0],UW+0.5,soulZ); scene.add(leg);
    });

    // Perkūnas — very dark charred oak, tall and imposing

    function makeCloud(cx,cy,cz,scale) {

    window.closeLore = function() {

    var raycaster = new THREE.Raycaster();

    var hoverTag = document.getElementById('hover-tag');
    rend.domElement.addEventListener('mousemove', function(e) {

      mouse2d.x =  (e.clientX / W) * 2 - 1;
      mouse2d.y = -(e.clientY / H) * 2 + 1;
      raycaster.setFromCamera(mouse2d, cam);
      var hits = raycaster.intersectObjects(clickables, false);
      if (hits.length > 0) {
        hoverTag.textContent = hits[0].object.userData.lore.title;
        hoverTag.style.display = 'block';
        hoverTag.style.left = e.clientX + 'px';
        hoverTag.style.top  = e.clientY + 'px';

      }
    });

    // ── WALK MODE ───────────────────────────────────────
    var walkMode = false;
    var walkYaw = 0, walkPitch = 0;
    var walkPos = new THREE.Vector3(0, MW+6.2, 9);
    var keys = {};
    var walkOverlay = document.getElementById('walk-overlay');
    var crosshair   = document.getElementById('crosshair');
    var walkHint    = document.getElementById('walk-hint');
    var walkBtn     = document.getElementById('walkBtn');
    var uiEl        = document.getElementById('ui');
    var labelEl     = document.getElementById('label');

    window.enterWalk = function() {
      goMiddle();
      setTimeout(function(){
        walkPos.set(2, MW+6.2, 10);
        walkYaw = Math.PI; walkPitch = 0;
        walkOverlay.classList.add('visible');
      }, 700);
    };

    window.requestLock = function() {
      rend.domElement.requestPointerLock();
    };

    function startWalk() {
      walkMode = true;
      walkOverlay.classList.remove('visible');
      crosshair.classList.add('visible');
      walkHint.classList.add('visible');
      walkBtn.textContent = 'Exit walk';
      walkBtn.onclick = exitWalk;
      uiEl.style.opacity = '0.3';
      labelEl.style.display = 'none';
    }

    window.exitWalk = function() {
      document.exitPointerLock();
      walkMode = false;
      crosshair.classList.remove('visible');
      walkHint.classList.remove('visible');
      walkBtn.textContent = 'Walk inside';
      walkBtn.onclick = enterWalk;
      uiEl.style.opacity = '1';
      labelEl.style.display = '';
      goMiddle();
    };

    document.addEventListener('pointerlockchange', function(){
      if (document.pointerLockElement === rend.domElement) {
        startWalk();
      } else if (walkMode) {
        exitWalk();
      }
    });

    window.addEventListener('keydown', function(e){ keys[e.code]=true;
      if (e.code==='Escape' && walkMode) exitWalk();
    });
    window.addEventListener('keyup',   function(e){ keys[e.code]=false; });

    window.addEventListener('mousemove', function(e){
      if (!walkMode) return;
      walkYaw   -= e.movementX * 0.002;
      walkPitch  = Math.max(-0.9, Math.min(0.9, walkPitch - e.movementY*0.002));
    });

    function updateWalk() {
      if (!walkMode) return;
      var speed = 0.06;
      var dir = new THREE.Vector3(Math.sin(walkYaw), 0, Math.cos(walkYaw));
      var right = new THREE.Vector3(Math.cos(walkYaw), 0, -Math.sin(walkYaw));
      if (keys['KeyW']||keys['ArrowUp'])    walkPos.addScaledVector(dir,   speed);
      if (keys['KeyS']||keys['ArrowDown'])  walkPos.addScaledVector(dir,  -speed);
      if (keys['KeyA']||keys['ArrowLeft'])  walkPos.addScaledVector(right, -speed);
      if (keys['KeyD']||keys['ArrowRight']) walkPos.addScaledVector(right,  speed);
      // clamp to island boundary
      var flatDist = Math.sqrt(walkPos.x*walkPos.x + walkPos.z*walkPos.z);
      if (flatDist > 15) { walkPos.x *= 15/flatDist; walkPos.z *= 15/flatDist; flatDist = 15; }

      // ground height follows mound cone: base r=9 y=0, top r=6 y=4.5, plateau inside r=6
      var groundY;
      if (flatDist <= 8.0) {
        groundY = MW + 4.5;
      } else if (flatDist >= 10.8) {
        groundY = MW;
      } else {
        groundY = MW + 4.5 * (10.8 - flatDist) / (10.8 - 8.0);
      }
      walkPos.y = groundY + 0.5;
      cam.position.copy(walkPos);
      var lookAt = new THREE.Vector3(
        walkPos.x + Math.sin(walkYaw)*Math.cos(walkPitch),
        walkPos.y + Math.sin(walkPitch),
        walkPos.z + Math.cos(walkYaw)*Math.cos(walkPitch)
      );
      cam.lookAt(lookAt);
    }

    // ── ORBIT CONTROLS ──────────────────────────────────
    var drag=false, px=0, py=0;
    rend.domElement.addEventListener('mousedown', function(e){
      if (walkMode) return;
      drag=true; px=e.clientX; py=e.clientY;
    });
    window.addEventListener('mouseup', function(){ drag=false; });
    window.addEventListener('mousemove', function(e){
      if (walkMode || !drag) return;
      th -= (e.clientX-px)*0.008; px=e.clientX;
      ph = Math.max(0.15, Math.min(1.45, ph+(e.clientY-py)*0.008)); py=e.clientY;
      tTh=th; tPh=ph; updCam();
    });
    rend.domElement.addEventListener('wheel', function(e){
      if (walkMode) return;
      tRd = Math.max(8, Math.min(90, tRd+e.deltaY*0.06));
    }, {passive:true});

    // Touch support
    var lastTouch = null;
    rend.domElement.addEventListener('touchstart', function(e){ lastTouch=e.touches[0]; });
    rend.domElement.addEventListener('touchmove', function(e){
      if (walkMode) return;
      e.preventDefault();
      var t2=e.touches[0];
      th -= (t2.clientX-lastTouch.clientX)*0.008;
      ph = Math.max(0.15, Math.min(1.45, ph+(t2.clientY-lastTouch.clientY)*0.008));
      tTh=th; tPh=ph; lastTouch=t2; updCam();
    }, {passive:false});

    // ── LOOP ────────────────────────────────────────────
    var t = 0;
    (function loop(){
      requestAnimationFrame(loop); t+=0.008;
      if (walkMode) {
        updateWalk();
      } else {
        th+=(tTh-th)*0.06; ph+=(tPh-ph)*0.06; rd+=(tRd-rd)*0.06; lookY+=(tLookY-lookY)*0.06;
        updCam();
      }
      skyL.intensity   = 1.6 + 0.4*Math.sin(t*0.8);
      grMat.opacity    = 0.3 + 0.1*Math.sin(t*0.6);
      fireL.intensity  = 4.0 + 1.2*Math.sin(t*1.3);
      waterL.intensity = 2.5 + 0.7*Math.sin(t*0.9+1.0);
      rL1.intensity    = 1.8 + 0.5*Math.sin(t*1.4+0.5);
      rL2.intensity    = 1.8 + 0.5*Math.sin(t*1.1+1.5);
      eL1.intensity    = 1.3 + 0.6*Math.sin(t*2.1);
      eL2.intensity    = 1.0 + 0.4*Math.sin(t*1.8+0.7);
      fpL.intensity    = 2.0 + 0.7*Math.sin(t*2.8);
      mwFireL.intensity  = 3.5 + 1.2*Math.sin(t*3.1+0.4);
      mwFireL2.intensity = 1.5 + 0.8*Math.sin(t*2.7+1.1);
      // animate smoke rising
      var sp=smokePosAttr.array;
      for (var si=0; si<smokeCount; si++) {
        var ph2=smokePhase[si]; var life=(t*0.4+ph2)%(Math.PI*2);
        var rise=life/(Math.PI*2)*5.5;
        var spread=rise*0.25;
        sp[si*3]   = smokeOff[si*2]   + Math.sin(t*0.9+ph2)*spread;
        sp[si*3+1] = fireBase+0.5+rise;
        sp[si*3+2] = smokeOff[si*2+1] + Math.cos(t*0.7+ph2)*spread;
      }
      smokePosAttr.needsUpdate=true;
      smokeMesh.material.opacity=0.28+0.07*Math.sin(t*0.5);
      waterMat.emissiveIntensity = 0.8 + 0.3*Math.sin(t*0.7);
      uwMistMat.opacity = 0.3 + 0.1*Math.sin(t*0.9);
      rend.render(scene, cam);
    })();
  })();
  </script>
