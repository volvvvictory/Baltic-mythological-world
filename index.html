<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baltic Mythological World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #b4c8cc; font-family: sans-serif; overflow: hidden; }
    #vc { width: 100vw; height: 100vh; display: block; }
    #ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
    }
    button {
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; padding: 8px 18px; border-radius: 20px; cursor: pointer;
      font-size: 14px; backdrop-filter: blur(6px); transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.32); }
    #label {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 0.08em;
      text-transform: uppercase; pointer-events: none;
    }
    #walk-overlay {
      display: none; position: fixed; inset: 0;
      align-items: center; justify-content: center; flex-direction: column; gap: 12px;
      background: rgba(0,0,0,0.45);
    }
    #walk-overlay.visible { display: flex; }
    #walk-overlay p { color: #fff; font-size: 15px; letter-spacing: 0.06em; text-align: center; line-height: 1.8; }
    #crosshair {
      display: none; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 20px; height: 20px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content:''; position: absolute; background: rgba(255,255,255,0.75);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    #crosshair.visible { display: block; }
    #walk-hint {
      display: none; position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 0.05em;
      pointer-events: none; text-align: center;
    }
    #walk-hint.visible { display: block; }
    #lore-panel {
      display: none; position: fixed; bottom: 80px; left: 24px;
      width: 300px; max-height: 70vh; overflow-y: auto;
      background: rgba(10,12,20,0.88); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 14px; padding: 1.2rem 1.4rem; color: #fff;
      backdrop-filter: blur(12px); transition: opacity 0.2s;
    }
    #lore-panel.visible { display: block; }
    #lore-panel .lore-world {
      font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
      color: rgba(255,220,100,0.75); margin-bottom: 6px;
    }
    #lore-panel .lore-title {
      font-size: 17px; font-weight: 500; margin-bottom: 10px; line-height: 1.3;
    }
    #lore-panel .lore-text {
      font-size: 13px; line-height: 1.8; color: rgba(255,255,255,0.78);
    }
    #lore-panel .lore-close {
      position: absolute; top: 10px; right: 14px;
      background: none; border: none; color: rgba(255,255,255,0.45);
      font-size: 18px; cursor: pointer; padding: 0; line-height: 1;
    }
    #lore-panel .lore-close:hover { color: #fff; background: none; }
    #hover-tag {
      display: none; position: fixed; pointer-events: none;
      background: rgba(10,12,20,0.82); border: 1px solid rgba(255,220,100,0.4);
      color: rgba(255,220,100,0.95); font-size: 11px; letter-spacing: 0.1em;
      text-transform: uppercase; padding: 5px 10px; border-radius: 6px;
      backdrop-filter: blur(8px); white-space: nowrap;
      transform: translate(14px, -50%);
    }
  </style>
</head>
<body>
  <div id="vc"></div>
  <div id="label">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
  <div id="ui">
    <button onclick="goUpper()">Sky world</button>
    <button onclick="goMiddle()">Hillfort</button>
    <button onclick="goLower()">Underworld</button>
    <button onclick="goAll()">All three</button>
    <button onclick="enterWalk()" id="walkBtn">Walk inside</button>
  </div>
  <div id="lore-panel">
    <button class="lore-close" onclick="closeLore()">✕</button>
    <div class="lore-world" id="lore-world"></div>
    <div class="lore-title" id="lore-title"></div>
    <div class="lore-text" id="lore-text"></div>
  </div>
  <div id="hover-tag"></div>
  <div id="walk-overlay">
    <p>WASD — move &nbsp;·&nbsp; Mouse — look<br>Click to start &nbsp;·&nbsp; Esc to exit</p>
    <button onclick="requestLock()">Click to enter</button>
  </div>
  <div id="crosshair"></div>
  <div id="walk-hint">WASD to move &nbsp;·&nbsp; Esc to exit walk mode</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function(){
    var el = document.getElementById('vc');
    var W = window.innerWidth, H = window.innerHeight;

    var rend = new THREE.WebGLRenderer({antialias:true});
    rend.setSize(W, H);
    rend.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    rend.shadowMap.enabled = true;
    rend.shadowMap.type = THREE.VSMShadowMap;
    rend.toneMapping = THREE.ACESFilmicToneMapping;
    rend.toneMappingExposure = 0.55;
    rend.outputEncoding = THREE.sRGBEncoding;
    rend.setClearColor(0xb4c8cc, 1);
    el.appendChild(rend.domElement);

    var scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xb4c8cc, 55, 110);

    var cam = new THREE.PerspectiveCamera(50, W/H, 0.1, 300);
    var th=0.9, ph=1.05, rd=62, tTh=0.9, tPh=1.05, tRd=62;
    var lookY=5, tLookY=5;

    function updCam() {
      cam.position.set(
        rd*Math.sin(ph)*Math.sin(th),
        rd*Math.cos(ph),
        rd*Math.sin(ph)*Math.cos(th)
      );
      cam.lookAt(0, lookY, 0);
    }
    updCam();

    window.goAll    = function(){ tTh=0.9;  tPh=1.05; tRd=62; tLookY=5;   };
    window.goUpper  = function(){ tTh=0.7;  tPh=0.6;  tRd=40; tLookY=24;  };
    window.goMiddle = function(){ tTh=0.85; tPh=0.88; tRd=26; tLookY=3;   };
    window.goLower  = function(){ tTh=0.5;  tPh=1.35; tRd=30; tLookY=-14; };

    window.addEventListener('resize', function(){
      W = window.innerWidth; H = window.innerHeight;
      cam.aspect = W/H; cam.updateProjectionMatrix();
      rend.setSize(W, H);
    });

    function fmf(c) {
      return new THREE.MeshPhongMaterial({color:c, flatShading:true, shininess:0});
    }
    function bm(c, op) {
      var m = new THREE.MeshBasicMaterial({color:c});
      if (op !== undefined) { m.transparent=true; m.opacity=op; }
      return m;
    }

    // ── LIGHTS ──────────────────────────────────────────
    scene.add(new THREE.HemisphereLight(0x4dc1ff, 0xffdca8, 0.5));
    scene.add(new THREE.AmbientLight(0xa68195, 0.35));
    var sun = new THREE.DirectionalLight(0xffd1d1, 3.5);
    sun.position.set(14, 18, 10); sun.castShadow = true;
    sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left=-28; sun.shadow.camera.right=28;
    sun.shadow.camera.top=28; sun.shadow.camera.bottom=-28;
    sun.shadow.radius = 3;
    scene.add(sun);

    var fireL  = new THREE.PointLight(0xffffff, 4.0, 34); fireL.position.set(0,-16,0);   scene.add(fireL);
    var waterL = new THREE.PointLight(0xcccccc, 2.5, 28); waterL.position.set(0,-17,0);  scene.add(waterL);
    var rL1    = new THREE.PointLight(0xaaaaaa, 1.8, 20); rL1.position.set(7,-14,4);     scene.add(rL1);
    var rL2    = new THREE.PointLight(0xbbbbbb, 1.8, 20); rL2.position.set(-7,-14,-4);   scene.add(rL2);
    var eL1    = new THREE.PointLight(0xffffff, 1.5, 12); eL1.position.set(5,-19,5);     scene.add(eL1);
    var eL2    = new THREE.PointLight(0xdddddd, 1.2, 10); eL2.position.set(-6,-20,-4);   scene.add(eL2);
    var fpL    = new THREE.PointLight(0xff8800, 2.5, 10); fpL.position.set(0,5.5,0);     scene.add(fpL);
    var skyL   = new THREE.PointLight(0xffd700, 1.8, 60); skyL.position.set(0,30,0);     scene.add(skyL);

    // ── LORE ────────────────────────────────────────────
    var clickables = [];

    function tag(mesh, world, title, text) {
      if (!mesh) return;
      mesh.userData.lore = {world:world, title:title, text:text};
      clickables.push(mesh);
    }

    var loreData = {
      tree: {
        world: 'The World Tree — Axis Mundi',
        title: 'The Sacred Oak',
        text: 'At the centre of the cosmos stood the World Tree — a great oak with nine branches connecting sky, earth, and the underworld. A piece of a lightning-struck oak was sacred, kept as a hereditary charm for household prosperity. If a tree breaks or falls in a dream, someone of the family will die.\n\nThe historian Hennenberger described fire offerings at Romove (Rāmava — "a calm, peaceful place") before a great oak with cult images of three deities carved into its trunk, surrounded by an angular curtain. Cutting trees in this sacred grove was forbidden to outsiders.'
      },
      hillfort: {
        world: 'Middle World — Žemė',
        title: 'The Hillfort',
        text: 'Reconstructed from medieval museum engravings, this scene recreates the circular village settlement and the fortified inner courtyard of a Baltic hillfort. Wooden palisades of sharpened logs ring the elevated plateau. Inside, longhouses, storage huts, and the central fire reflect the daily life of a community bound by kinship and ritual.\n\nThe hillfort was both refuge and gathering place — a world unto itself, where the sacred fire was never allowed to go out. Its gate marked the threshold between the safety of the known world and the wilderness beyond.'
      },
      longhouse: {
        world: 'Middle World — Žemė',
        title: 'The Longhouse',
        text: 'Families lived in longhouses — rectangular wooden structures shared by an extended household. A central hearth provided warmth and light. When a child was born, a tree was planted in the backyard, becoming their peer and growing alongside them — gradually sanctified as a bond with the ancestor resting beneath it.\n\nTrees carried gender in Latvian folklore: oak, birch, ash and willow were masculine; linden, pine, spruce, bird-cherry and apple were feminine.'
      },
      gate: {
        world: 'Middle World — Žemė',
        title: 'The Gate Tower',
        text: 'The gate was the most defended point of any hillfort — the place where the community controlled who entered and who did not. In Baltic tradition, thresholds and boundaries held strong symbolic power, marking the edge between the familiar and the unknown.\n\nRaids by neighbouring tribes and Viking sea-farers drove communities to build these fortifications on high ground or water, making the gate both a physical and symbolic boundary between safety and the outside world.'
      },
      underworld: {
        world: 'Lower World — Velnias Realm',
        title: 'The Underworld',
        text: 'Modelled on ancient Prussian belief, this realm beneath the earth is where ancestral spirits and the gods of the underworld resided. The tangled roots of the World Tree reach down into this dark place, drawing up hidden waters and binding the living world to the dead.\n\nVelnias — god of the underworld, cattle, and the dead — dwells here in eternal opposition to Pērkons. In Baltic tradition, death was not an end but a crossing: Māra, goddess of earth and the material world, received the body, while the sky god Dievs took the soul.'
      },
      portal: {
        world: 'The Cosmic Boundary',
        title: 'The Portal Ring',
        text: 'Where the World Tree passes through each realm, a boundary is formed — a threshold between worlds. These liminal zones were places of great power and danger in Baltic belief.\n\nThe Sun goddess Saule was said to travel the sky each day on a chariot, then descend below the horizon into the realm of the dead at night, passing through just such a boundary. At dusk and dawn, the worlds briefly touched.'
      },
      canopy: {
        world: 'Upper World — Dangus',
        title: 'The Sky Realm',
        text: 'The sacred oak\'s massive canopy reconstructs the Upper World of Baltic belief. Rather than a literal crown, the rising smoke of the eternal altar fire has been abstracted upward through a golden ring — a symbol of the sun and the gateway to the divine heavens.\n\nNine branches hold the nine celestial bodies: gods and stars whose movements governed the fate of the world below. The souls of the dead were said to rest here as birds among the leaves, and the sky god Dievs rode quietly across the heavens, maintaining the cosmic order.'
      },
      perkūnas: {
        world: 'The Three Idols of Romove',
        title: 'Perkūnas — God of Thunder',
        text: 'The supreme god of thunder, sky, storms, and fire. Perkūnas enforces cosmic order and divine law, riding a goat-drawn chariot and carrying a sacred axe. He wages eternal war against Patulas, driving serpents and the spirits of the dead back to the underworld with his lightning.\n\nHis idol was kept burning with eternal fire — an ever-living flame of oak wood that the priests were forbidden to let die, on pain of death. The oak was his sacred tree.'
      },
      patrimpas: {
        world: 'The Three Idols of Romove',
        title: 'Patrimpas — God of the Living Earth',
        text: 'The youthful god of springs, rivers, grain, and the living world. Patrimpas governed fertility and the abundance of the earth — harvests, cattle, and the vital force that runs through all growing things.\n\nHis idol was wreathed in grain stalks and a snake was kept coiled at its base, fed with milk by the priests. The snake was sacred: a sign of prosperity in the household, and an omen of misfortune if it fled.'
      },
      patulas: {
        world: 'The Three Idols of Romove',
        title: 'Patulas — God of the Underworld',
        text: 'The grim ruler of the dead. Patulas received the souls of the departed and governed the dark realm beneath the earth — a pale, hollow-eyed figure with a long grey beard, whose face was turned downward toward the roots.\n\nAt Romove the three idols of Perkūnas, Patrimpas, and Patulas were carved into a single great oak, separated by an angular curtain of cloth. Together they held the three realms in balance: sky, earth, and underworld — the full axis of the Baltic cosmos.'
      }
    };

    // ── TRUNK (world tree / oak) ─────────────────────────
    var barkDark = 0x3a2810, barkMid = 0x4a3418, barkLight = 0x5a4020;

    // main trunk — starts just above underworld, only visible from MW upward
    // segment: y=-4 to y=4 (the section between underworld and hillfort)
    var midTrunk = new THREE.Mesh(new THREE.CylinderGeometry(0.42,0.55,8,7,1), fmf(barkMid));
    midTrunk.position.y = 0; midTrunk.castShadow=true; scene.add(midTrunk);
    tag(midTrunk, loreData.tree.world, loreData.tree.title, loreData.tree.text);

    // gnarled sub-trunks — only above ground, start at y=-3
    [[ 0.18, 0.0,  0.12, 7, -3],
     [-0.14, 0.0, -0.10, 6, -3],
     [ 0.0,  0.10, 0.0,  5, -3]].forEach(function(g){
      var gt=new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.18,g[3],6,1),fmf(barkDark));
      gt.position.set(g[0],g[4]+g[3]/2,g[2]); gt.rotation.z=g[1]*0.3; gt.castShadow=true; scene.add(gt);
    });

    // bark bump details along the visible mid-trunk
    for (var i=0; i<14; i++) {
      var ba=i/14*Math.PI*2, by=-14+i*2.2;
      var bump=new THREE.Mesh(new THREE.BoxGeometry(0.14,0.22,0.10),fmf(i%2===0?barkDark:barkMid));
      bump.position.set(Math.cos(ba)*0.48,by,Math.sin(ba)*0.48); bump.rotation.y=ba; scene.add(bump);
    }

    // upper trunk — solid from y=11, oak brown
    var solidTrunk = new THREE.Mesh(new THREE.CylinderGeometry(0.22,0.34,7.5,7,1), fmf(barkLight));
    solidTrunk.position.y = 11.0 + 7.5/2; solidTrunk.castShadow=true; scene.add(solidTrunk);

    // large spreading oak branches from upper trunk
    var branchDefs = [
      // [fromX,fromY,fromZ, toX,toY,toZ, r]
      [ 0,13, 0,   3.5,16, 2.0,  0.18],
      [ 0,13, 0,  -3.0,15, 2.5,  0.16],
      [ 0,13, 0,   2.5,15,-3.0,  0.16],
      [ 0,13, 0,  -2.0,14,-2.5,  0.14],
      [ 0,15, 0,   4.5,17,-1.0,  0.12],
      [ 0,15, 0,  -4.0,17, 1.5,  0.12],
      [ 0,15, 0,   1.0,17, 4.0,  0.11],
      [ 0,15, 0,  -1.5,16,-4.5,  0.11],
    ];
    branchDefs.forEach(function(b){
      var from=new THREE.Vector3(b[0],b[1],b[2]);
      var to=new THREE.Vector3(b[3],b[4],b[5]);
      var dir=new THREE.Vector3().subVectors(to,from);
      var len=dir.length();
      var mid=new THREE.Vector3().addVectors(from,to).multiplyScalar(0.5);
      var curve=new THREE.CatmullRomCurve3([from, mid.clone().add(new THREE.Vector3((Math.random()-0.5)*1.5,0,(Math.random()-0.5)*1.5)), to]);
      var geo=new THREE.TubeGeometry(curve,10,b[6],6,false);
      var mesh=new THREE.Mesh(geo,fmf(barkLight)); mesh.castShadow=true; scene.add(mesh);
    });

    // fade-in segments where trunk materialises above the hillfort
    var trunkFade = [
      [0.31,0.34, 10.5, 11.0, 0.85],
      [0.29,0.31, 10.0, 10.5, 0.65],
      [0.27,0.29,  9.5, 10.0, 0.42],
      [0.25,0.27,  9.0,  9.5, 0.22],
      [0.24,0.25,  8.5,  9.0, 0.10],
      [0.23,0.24,  8.0,  8.5, 0.04],
      [0.22,0.23,  7.5,  8.0, 0.01],
    ];
    trunkFade.forEach(function(f){
      var h=f[3]-f[2];
      var mat=new THREE.MeshPhongMaterial({color:barkMid,transparent:true,opacity:f[4],flatShading:true,depthWrite:false});
      var seg=new THREE.Mesh(new THREE.CylinderGeometry(f[0],f[1],h,7,1),mat);
      seg.position.y=f[2]+h/2; scene.add(seg);
    });
    // dissolve corona where trunk meets the hillfort — additive glow widens toward fire
    var dissolveGeo = new THREE.CylinderGeometry(2.2, 0.5, 7, 10, 1, true);
    var dissolveMat = new THREE.MeshBasicMaterial({color:0x88ffcc, transparent:true, opacity:0.13, side:THREE.DoubleSide, depthWrite:false, blending:THREE.AdditiveBlending});
    var dissolveMesh = new THREE.Mesh(dissolveGeo, dissolveMat);
    dissolveMesh.position.y = 1.0; scene.add(dissolveMesh);
    // soft outer ring
    var dissolveGeo2 = new THREE.CylinderGeometry(3.8, 0.4, 5, 10, 1, true);
    var dissolveMat2 = new THREE.MeshBasicMaterial({color:0x44ddaa, transparent:true, opacity:0.07, side:THREE.DoubleSide, depthWrite:false, blending:THREE.AdditiveBlending});
    var dissolveMesh2 = new THREE.Mesh(dissolveGeo2, dissolveMat2);
    dissolveMesh2.position.y = 2.0; scene.add(dissolveMesh2);
    [0, 18].forEach(function(y, i){
      var r = new THREE.Mesh(new THREE.TorusGeometry(1.1,0.14,6,24), bm(i===0?0x00ffcc:0xffd700, 0.85));
      r.position.y = y; scene.add(r);
      tag(r, loreData.portal.world, loreData.portal.title, loreData.portal.text);
    });

    // ── UNDERWORLD ──────────────────────────────────────
    var UW = -18;
    // ground layers — near-black to dark gray
    [[16,0.8,0x0a0a0a],[13,0.7,0x111111],[10,0.6,0x080808]].forEach(function(d,i){
      var layer = new THREE.Mesh(new THREE.CylinderGeometry(d[0]-i,d[0],d[1],10,1), fmf(d[2]));
      layer.position.y = UW-0.4-i*0.5; scene.add(layer);
    });
    // flat ground plane — black
    var uwGround = new THREE.Mesh(new THREE.CircleGeometry(16,14), fmf(0x0d0d0d));
    uwGround.rotation.x=-Math.PI/2; uwGround.position.y=UW-0.02; scene.add(uwGround);

    // water/void pool — dark mirror, bright white emissive shimmer
    var waterMat = new THREE.MeshPhongMaterial({
      color:0x111111, emissive:0xffffff, emissiveIntensity:0.08,
      flatShading:true, shininess:200, transparent:true, opacity:0.95
    });
    var waterMesh = new THREE.Mesh(new THREE.CircleGeometry(7,14), waterMat);
    waterMesh.rotation.x=-Math.PI/2; waterMesh.position.y=UW+0.05; scene.add(waterMesh);
    tag(waterMesh, loreData.underworld.world, loreData.underworld.title, loreData.underworld.text);

    // white cracks / seams in ground
    [[5,4],[-5,-3],[3,8],[-7,2],[5,-7],[-3,6],[7,-3]].forEach(function(p){
      var em = new THREE.Mesh(new THREE.CircleGeometry(0.45,7), bm(0xffffff,0.7));
      em.rotation.x=-Math.PI/2; em.position.set(p[0],UW+0.08,p[1]); scene.add(em);
      var halo = new THREE.Mesh(new THREE.CircleGeometry(1.0,7), bm(0xffffff,0.12));
      halo.rotation.x=-Math.PI/2; halo.position.set(p[0],UW+0.07,p[1]); scene.add(halo);
    });

    // horizon fog ring — pale white mist at edge
    var horizonRing = new THREE.Mesh(new THREE.RingGeometry(13,17,32), new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.06,depthWrite:false,blending:THREE.AdditiveBlending,side:THREE.DoubleSide}));
    horizonRing.rotation.x=-Math.PI/2; horizonRing.position.y=UW+0.1; scene.add(horizonRing);

    // stone dome structures at perimeter — dark gray
    [[0.4,13],[1.3,14],[2.2,12],[3.5,13],[4.8,14],[5.6,12]].forEach(function(d){
      var dx=Math.cos(d[0])*d[1], dz=Math.sin(d[0])*d[1];
      var dome=new THREE.Mesh(new THREE.SphereGeometry(1.4+Math.random()*0.6,8,6,0,Math.PI*2,0,Math.PI/2),fmf(0x222222));
      dome.position.set(dx,UW+0.1,dz); scene.add(dome);
      var domeGlow=new THREE.Mesh(new THREE.SphereGeometry(1.9,8,6,0,Math.PI*2,0,Math.PI/2),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.04,depthWrite:false,blending:THREE.AdditiveBlending}));
      domeGlow.position.set(dx,UW+0.1,dz); scene.add(domeGlow);
    });

    // tall plants — black silhouettes
    function makeUWPlant(px, pz, h) {
      var stalk=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.10,h,5,1),fmf(0x111111));
      stalk.position.set(px,UW+h/2,pz); scene.add(stalk);
      for (var i=0; i<7; i++) {
        var la=i/7*Math.PI*2;
        var leaf=new THREE.Mesh(new THREE.ConeGeometry(0.22,1.8,4,1),fmf(0x181818));
        leaf.rotation.z=Math.PI*0.38; leaf.rotation.y=la;
        leaf.position.set(px+Math.cos(la)*0.85,UW+0.5,pz+Math.sin(la)*0.85); scene.add(leaf);
      }
      for (var i=0; i<5; i++) {
        var fa=i/5*Math.PI*2, fr=0.28;
        var fl=new THREE.Mesh(new THREE.SphereGeometry(0.16,5,4),fmf(i%2===0?0x333333:0x222222));
        fl.position.set(px+Math.cos(fa)*fr,UW+h+0.2,pz+Math.sin(fa)*fr); scene.add(fl);
      }
    }
    makeUWPlant(8, 4, 6.5);
    makeUWPlant(-6, 7, 4.5);
    makeUWPlant(4, -9, 5.0);

    // dense low shrubs — dark gray lumps
    for (var i=0; i<28; i++) {
      var sa=i/28*Math.PI*2, sr=8+Math.random()*5;
      var sx=Math.cos(sa)*sr, sz=Math.sin(sa)*sr;
      var sh=0.4+Math.random()*0.6;
      var shrub=new THREE.Mesh(new THREE.SphereGeometry(sh,5,4),fmf(i%2===0?0x1a1a1a:0x141414));
      shrub.scale.y=0.5; shrub.position.set(sx,UW+sh*0.25,sz); scene.add(shrub);
    }

    // soul figure — white silhouette
    var soulX=5, soulZ=2;
    [[-0.12,0],[0.12,0]].forEach(function(l){
      var leg=new THREE.Mesh(new THREE.CylinderGeometry(0.08,0.10,1.0,5,1),fmf(0xdddddd));
      leg.position.set(soulX+l[0],UW+0.5,soulZ); scene.add(leg);
    });
    var torso=new THREE.Mesh(new THREE.BoxGeometry(0.38,0.7,0.26),fmf(0xeeeeee));
    torso.position.set(soulX,UW+1.45,soulZ); scene.add(torso);
    var head=new THREE.Mesh(new THREE.SphereGeometry(0.22,6,5),fmf(0xffffff));
    head.position.set(soulX,UW+2.05,soulZ); scene.add(head);
    var cloak=new THREE.Mesh(new THREE.ConeGeometry(0.32,1.1,5,1),fmf(0xcccccc));
    cloak.position.set(soulX,UW+0.9,soulZ); scene.add(cloak);
    var aura=new THREE.Mesh(new THREE.SphereGeometry(0.5,8,6),new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.08,depthWrite:false,blending:THREE.AdditiveBlending}));
    aura.position.set(soulX,UW+1.5,soulZ); scene.add(aura);

    // ROOTS — Monument Valley style: flat rectangular beams, sharp 90-degree turns
    var rootMats=[
      new THREE.MeshPhongMaterial({color:0x2a2a2a,flatShading:true}),
      new THREE.MeshPhongMaterial({color:0x333333,flatShading:true}),
      new THREE.MeshPhongMaterial({color:0x1e1e1e,flatShading:true}),
      new THREE.MeshPhongMaterial({color:0x3d3d3d,flatShading:true}),
    ];
    function rootBeam(x1,y1,z1,x2,y2,z2,tw,th,mi){
      var dx=x2-x1,dy=y2-y1,dz=z2-z1;
      var len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(len<0.01) return;
      var m=new THREE.Mesh(new THREE.BoxGeometry(tw,len,th),rootMats[mi%4]);
      m.position.set((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);
      m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(dx/len,dy/len,dz/len));
      m.castShadow=true; scene.add(m);
    }
    function rootCorner(x,y,z,s,mi){
      var c=new THREE.Mesh(new THREE.BoxGeometry(s,s,s),rootMats[mi%4]);
      c.position.set(x,y,z); scene.add(c);
    }
    // INTERTWINED roots: each root starts radially then horizontal-runs to a DIFFERENT angle,
    // crossing neighbours. Alternating Y depths create over/under weave.
    // [startAngle, elbowAngle, r1, y1, r2, y2, endR, tw, th, mi]
    var rootStartY=-4;
    var ey=UW+0.5;
    var step=Math.PI*2/12;
    var hs=step*0.5; // half-step offset for secondary roots
    [
      // PRIMARY — 12 main roots, wide crossing (+/-1.5 steps)
      // [sA,             eA,               r1, y1,  r2,  y2,  endR, tw,   th,   mi]
      [0*step,        0*step+step*1.5,   7, -6,  16, -11,  17, 1.10, 0.55, 0],
      [1*step,        1*step-step*1.5,   6, -8,  14, -13,  15, 0.90, 0.48, 1],
      [2*step,        2*step+step*1.5,   8, -6,  16, -11,  18, 1.20, 0.60, 2],
      [3*step,        3*step-step*1.5,   7, -8,  15, -13,  16, 1.00, 0.50, 3],
      [4*step,        4*step+step*1.5,   6, -6,  16, -11,  17, 1.10, 0.55, 0],
      [5*step,        5*step-step*1.5,   8, -8,  14, -13,  15, 0.90, 0.45, 1],
      [6*step,        6*step+step*1.5,   7, -6,  16, -11,  18, 1.20, 0.58, 2],
      [7*step,        7*step-step*1.5,   6, -8,  15, -13,  16, 1.00, 0.50, 3],
      [8*step,        8*step+step*1.5,   8, -6,  16, -11,  17, 1.10, 0.55, 0],
      [9*step,        9*step-step*1.5,   7, -8,  14, -13,  15, 0.90, 0.46, 1],
      [10*step,      10*step+step*1.5,   6, -6,  16, -11,  18, 1.20, 0.60, 2],
      [11*step,      11*step-step*1.5,   8, -8,  15, -13,  16, 1.00, 0.50, 3],
      // SECONDARY — 12 thinner roots offset by half-step, shorter crossing (+/-1 step)
      [0*step+hs,    0*step+hs+step,     5, -7,  12, -12,  14, 0.70, 0.38, 1],
      [1*step+hs,    1*step+hs-step,     5, -9,  11, -14,  13, 0.65, 0.35, 2],
      [2*step+hs,    2*step+hs+step,     6, -7,  13, -12,  15, 0.72, 0.38, 3],
      [3*step+hs,    3*step+hs-step,     5, -9,  12, -14,  14, 0.65, 0.35, 0],
      [4*step+hs,    4*step+hs+step,     6, -7,  11, -12,  14, 0.70, 0.38, 1],
      [5*step+hs,    5*step+hs-step,     5, -9,  13, -14,  15, 0.65, 0.35, 2],
      [6*step+hs,    6*step+hs+step,     6, -7,  12, -12,  14, 0.72, 0.38, 3],
      [7*step+hs,    7*step+hs-step,     5, -9,  11, -14,  13, 0.65, 0.35, 0],
      [8*step+hs,    8*step+hs+step,     6, -7,  13, -12,  15, 0.70, 0.38, 1],
      [9*step+hs,    9*step+hs-step,     5, -9,  12, -14,  14, 0.65, 0.35, 2],
      [10*step+hs,  10*step+hs+step,     6, -7,  11, -12,  14, 0.72, 0.38, 3],
      [11*step+hs,  11*step+hs-step,     5, -9,  13, -14,  15, 0.65, 0.35, 0],
      // TERTIARY — 8 thin surface roots, nearly horizontal, short crossing
      [0.25,   0.25+step*2,   4, -5,  10, -10,  12, 0.50, 0.28, 2],
      [1.30,   1.30-step*2,   4, -5,   9, -10,  11, 0.48, 0.26, 3],
      [2.35,   2.35+step*2,   5, -5,  10, -10,  13, 0.50, 0.28, 0],
      [3.40,   3.40-step*2,   4, -5,   9, -10,  11, 0.48, 0.26, 1],
      [4.45,   4.45+step*2,   5, -5,  10, -10,  12, 0.50, 0.28, 2],
      [5.50,   5.50-step*2,   4, -5,   9, -10,  11, 0.48, 0.26, 3],
      [0.80,   0.80+step*2,   4, -5,  10, -10,  13, 0.50, 0.28, 0],
      [2.90,   2.90-step*2,   4, -5,   9, -10,  12, 0.48, 0.26, 1],
    ].forEach(function(d){
      var sa=d[0], ea=d[1], r1=d[2], y1=d[3], r2=d[4], y2=d[5], er=d[6], tw=d[7], th=d[8], mi=d[9];
      var p0x=Math.cos(sa)*0.5, p0z=Math.sin(sa)*0.5;           // trunk exit
      var p1x=Math.cos(sa)*r1,  p1z=Math.sin(sa)*r1;            // first elbow (radial)
      var p2x=Math.cos(ea)*r2,  p2z=Math.sin(ea)*r2;            // second elbow (deviated angle)
      var p3x=Math.cos(ea)*er,  p3z=Math.sin(ea)*er;            // tip at ground
      // seg 1: diagonal drop from trunk to first elbow
      rootBeam(p0x,rootStartY,p0z, p1x,y1,p1z, tw,th,mi);
      // seg 2: angular run crossing to deviated angle (at y1 → y2)
      rootBeam(p1x,y1,p1z, p2x,y2,p2z, tw*0.82,th*0.75,mi);
      // seg 3: horizontal run outward to final radius (at constant y2)
      rootBeam(p2x,y2,p2z, p3x,y2,p3z, tw*0.68,th*0.60,mi);
      // seg 4: vertical drop to ground
      rootBeam(p3x,y2,p3z, p3x,ey,p3z, tw*0.52,th*0.46,mi);
      // corner filler boxes
      rootCorner(p1x,y1,p1z, tw*0.95, mi);
      rootCorner(p2x,y2,p2z, tw*0.75, mi);
      rootCorner(p3x,y2,p3z, tw*0.58, mi);
    });

    // Stars in the underworld void
    var uwSp=[];
    for (var i=0; i<300; i++) {
      var ut=Math.random()*Math.PI*2, ur=12+Math.random()*28, uy=UW+Math.random()*16;
      uwSp.push(ur*Math.cos(ut), uy, ur*Math.sin(ut));
    }
    var uwSg=new THREE.BufferGeometry();
    uwSg.setAttribute('position',new THREE.Float32BufferAttribute(uwSp,3));
    scene.add(new THREE.Points(uwSg,new THREE.PointsMaterial({color:0xffffff,size:0.12})));

    // Bioluminescent tips at water level
    for (var i=0; i<10; i++) {
      var da=i/10*Math.PI*2, dr=7+(i%4)*1.2;
      var dot=new THREE.Mesh(new THREE.SphereGeometry(0.2,5,5),bm(i%2===0?0x00eebb:0x4477ff));
      dot.position.set(Math.cos(da)*dr, UW+0.5, Math.sin(da)*dr); scene.add(dot);
    }
    for (var i=0; i<12; i++) {
      var sa=i/12*Math.PI*2, sr=6+(i%4)*1.6, ssw=0.7+(i%3)*0.4, ssh=0.5+(i%4)*0.4;
      var stone = new THREE.Mesh(new THREE.BoxGeometry(ssw,ssh,ssw*0.8), fmf(0x1c1220));
      stone.position.set(Math.cos(sa)*sr, UW+ssh/2, Math.sin(sa)*sr);
      stone.rotation.y=i*0.6; stone.castShadow=true; scene.add(stone);
    }
    var uwMistMat = bm(0x080a18, 0.4);
    var uwMistMesh = new THREE.Mesh(new THREE.CircleGeometry(12,32), uwMistMat);
    uwMistMesh.rotation.x=-Math.PI/2; uwMistMesh.position.y=-0.5; scene.add(uwMistMesh);

    // ── MIDDLE WORLD — HILLFORT ──────────────────────────
    var MW = 0;
    [0xc49058,0xd4a468,0xe0b478,0xeac488].forEach(function(c,i){
      var r2 = 12+i*2.2;
      var layer = new THREE.Mesh(new THREE.CylinderGeometry(r2,r2+2,0.55,14,1), fmf(c));
      layer.position.y = MW-0.28-i*0.45; scene.add(layer);
    });
    var topterra = new THREE.Mesh(new THREE.CircleGeometry(12,14), fmf(0xc49058));
    topterra.rotation.x=-Math.PI/2; topterra.position.y=MW+0.01; scene.add(topterra);
    var ditch = new THREE.Mesh(new THREE.RingGeometry(11.0,12.8,14), fmf(0x8a5a30));
    ditch.rotation.x=-Math.PI/2; ditch.position.y=MW-0.04; scene.add(ditch);

    var mound = new THREE.Mesh(new THREE.CylinderGeometry(8.0,10.5,4.5,12,1), fmf(0x60a030));
    mound.position.y=MW+2.25; mound.castShadow=true; mound.receiveShadow=true; scene.add(mound);
    tag(mound, loreData.hillfort.world, loreData.hillfort.title, loreData.hillfort.text);
    var plat = new THREE.Mesh(new THREE.CircleGeometry(8.0,12), fmf(0x72b83a));
    plat.rotation.x=-Math.PI/2; plat.position.y=MW+4.52; scene.add(plat);

    // gate angle in palisade convention: cos(pa)=sin(ugAngle), sin(pa)=cos(ugAngle)
    var gatePA = Math.atan2(6.45, 3.45); // gate position (x=3.45, z=6.45)
    var gateGap = 0.26; // half-angle of opening
    var pMat = fmf(0x9a6230);
    for (var i=0; i<32; i++) {
      var pa = i/32*Math.PI*2;
      var adiff = pa - gatePA;
      while(adiff>Math.PI) adiff-=Math.PI*2; while(adiff<-Math.PI) adiff+=Math.PI*2;
      if(Math.abs(adiff)<gateGap) continue; // skip posts inside gate
      var post = new THREE.Mesh(new THREE.BoxGeometry(0.24,1.5,0.24), pMat);
      post.position.set(Math.cos(pa)*7.6, MW+5.25, Math.sin(pa)*7.6); post.castShadow=true; scene.add(post);
    }
    // open-arc rail — TubeGeometry going around all but the gate gap
    (function(){
      var pts=[], segs=64, r=7.6, startA=gatePA+gateGap, span=Math.PI*2-gateGap*2;
      for(var i=0;i<=segs;i++){
        var a=startA+span*i/segs;
        pts.push(new THREE.Vector3(Math.cos(a)*r, MW+5.65, Math.sin(a)*r));
      }
      var rail=new THREE.Mesh(new THREE.TubeGeometry(new THREE.CatmullRomCurve3(pts),segs,0.12,4,false),fmf(0x7a4820));
      scene.add(rail);
    })();

    [0,Math.PI*0.5,Math.PI,Math.PI*1.5].forEach(function(a){
      var tx=Math.cos(a)*7.4, tz=Math.sin(a)*7.4, ty=MW+4.5;
      var base = new THREE.Mesh(new THREE.BoxGeometry(1.2,2.2,1.2), fmf(0xaa7038));
      base.position.set(tx,ty+1.1,tz); base.castShadow=true; scene.add(base);
      var roof = new THREE.Mesh(new THREE.ConeGeometry(1.0,1.0,4,1), fmf(0x7a4020));
      roof.position.set(tx,ty+2.7,tz); roof.rotation.y=Math.PI/4; scene.add(roof);
    });

    var gty = MW+4.5;
    var gWoodDark = fmf(0x7a4820), gWoodMid = fmf(0x9a6030), gWoodDarkest = fmf(0x3a1c08);

    // ── UPPER HILLFORT GATE — group so we can rotate it as one piece ──
    var ugGroup = new THREE.Group();
    ugGroup.position.set(3.45, 0, 6.45);
    ugGroup.rotation.y = 0.54;
    window._ugGroup = ugGroup;
    scene.add(ugGroup);
    function ugAdd(m){ ugGroup.add(m); }
    [-1.35, 1.35].forEach(function(ox, ti){
      var gtower = new THREE.Mesh(new THREE.BoxGeometry(1.1,3.4,1.1), gWoodMid);
      gtower.position.set(ox, gty+1.7, 0); gtower.castShadow=true; ugAdd(gtower);
      if(ti===0) tag(gtower, loreData.gate.world, loreData.gate.title, loreData.gate.text);
      var groof = new THREE.Mesh(new THREE.ConeGeometry(0.88,1.1,4,1), gWoodDark);
      groof.position.set(ox, gty+3.95, 0); groof.rotation.y=Math.PI/4; groof.castShadow=true; ugAdd(groof);
      [0.6,1.5,2.4].forEach(function(by){
        var band=new THREE.Mesh(new THREE.BoxGeometry(1.15,0.12,1.15), gWoodDarkest);
        band.position.set(ox, gty+by, 0); ugAdd(band);
      });
      var tside = ox>0?0.65:-0.65;
      var tpole=new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.07,1.0,5,1), gWoodDarkest);
      tpole.position.set(ox+tside, gty+1.5, 0); ugAdd(tpole);
      var tbowl=new THREE.Mesh(new THREE.CylinderGeometry(0.10,0.06,0.18,6,1), fmf(0x3a2010));
      tbowl.position.set(ox+tside, gty+2.06, 0); ugAdd(tbowl);
      var tflame=new THREE.Mesh(new THREE.ConeGeometry(0.08,0.26,6,1), bm(0xff8820,0.9));
      tflame.position.set(ox+tside, gty+2.26, 0); ugAdd(tflame);
      var tL=new THREE.PointLight(0xff9930,1.0,4.5);
      tL.position.set(ox+tside, gty+2.4, 0); ugGroup.add(tL);
    });
    var glintel=new THREE.Mesh(new THREE.BoxGeometry(2.9,0.28,0.9), gWoodDark);
    glintel.position.set(0, gty+3.4, 0); ugAdd(glintel);
    var gbeam2u=new THREE.Mesh(new THREE.BoxGeometry(3.2,0.16,0.6), gWoodDarkest);
    gbeam2u.position.set(0, gty+3.72, 0); ugAdd(gbeam2u);
    var garch=new THREE.Mesh(new THREE.BoxGeometry(1.5,2.2,0.05), gWoodDarkest);
    garch.position.set(0, gty+1.1, -0.32); ugAdd(garch);

    // ── VILLAGE ENTRANCE GATE — group for matching rotation ──
    var entMat  = fmf(0x7a4820);
    var entMat2 = fmf(0x5a3010);
    var egGroup = new THREE.Group();
    egGroup.position.set(2.0, 0, 12.2);
    egGroup.rotation.y = -Math.atan2(2.0, 12.2); // perpendicular to mound edge at this point
    scene.add(egGroup);
    function egAdd(m){ egGroup.add(m); }
    [[-1.1,0],[1.1,0]].forEach(function(p){
      var post=new THREE.Mesh(new THREE.CylinderGeometry(0.15,0.20,3.6,7,1),entMat);
      post.position.set(p[0], MW+1.8, 0); post.castShadow=true; egAdd(post);
      var cap=new THREE.Mesh(new THREE.CylinderGeometry(0.10,0.18,0.28,7,1),entMat2);
      cap.position.set(p[0], MW+3.74, 0); egAdd(cap);
    });
    var entBeam=new THREE.Mesh(new THREE.BoxGeometry(2.6,0.22,0.28),entMat2);
    entBeam.position.set(0, MW+3.5, 0); egAdd(entBeam);
    var entBeam2=new THREE.Mesh(new THREE.BoxGeometry(3.0,0.14,0.20),entMat);
    entBeam2.position.set(0, MW+3.78, 0); egAdd(entBeam2);
    var plate=new THREE.Mesh(new THREE.BoxGeometry(1.4,0.48,0.12),fmf(0x3a1e06));
    plate.position.set(0, MW+2.6, -0.08); egAdd(plate);

    [[-1.9,0.3],[1.9,0.3]].forEach(function(p,ti){
      var tpole=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,2.0,5,1),entMat2);
      tpole.position.set(p[0], MW+1.0, p[1]); egAdd(tpole);
      var tbowl=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.08,0.22,6,1),fmf(0x3a2010));
      tbowl.position.set(p[0], MW+2.12, p[1]); egAdd(tbowl);
      var tfire=new THREE.Mesh(new THREE.ConeGeometry(0.10,0.32,6,1),bm(0xff8820,0.9));
      tfire.position.set(p[0], MW+2.38, p[1]); egAdd(tfire);
      var tL=new THREE.PointLight(0xff9930, 1.2, 5.0);
      tL.position.set(p[0], MW+2.5, p[1]); egAdd(tL);
    });

    // dirt path from outer edge toward gate
    var entZ=12.2;
    for(var pi=0; pi<8; pi++){
      var pz=entZ+1.5+pi*1.1;
      var pw=1.8+pi*0.2;
      var pathSlab=new THREE.Mesh(new THREE.BoxGeometry(pw,0.04,0.9),fmf(pi%2===0?0xb09060:0xa07c50));
      pathSlab.position.set(0, MW+0.02, pz); pathSlab.receiveShadow=true; scene.add(pathSlab);
    }

    // Stairs — wide flat steps going from outer ground up the mound face
    var STEPS = 18;
    for (var i=0; i<STEPS; i++) {
      var t2 = i/(STEPS-1);
      var sa3 = 0.0 + t2*0.55;
      var sr3 = 11.0 - t2*3.2;
      var stepY = MW + t2*4.5;
      var stepW = 2.2 - t2*0.5;
      var rp = new THREE.Mesh(new THREE.BoxGeometry(stepW, 0.22, 0.75), fmf(i%2===0?0x9a6a38:0x8a5a28));
      rp.position.set(Math.sin(sa3)*sr3, stepY, Math.cos(sa3)*sr3);
      rp.rotation.y = -sa3;
      rp.castShadow = true; scene.add(rp);
      if (i < STEPS-1) {
        var rh3 = 4.5/STEPS;
        var riser = new THREE.Mesh(new THREE.BoxGeometry(stepW, rh3, 0.18), fmf(0x7a4a20));
        riser.position.set(Math.sin(sa3)*sr3, stepY+rh3/2, Math.cos(sa3)*sr3 - 0.45);
        riser.rotation.y = -sa3; scene.add(riser);
      }
    }

    // Longhouses — ring + center layout like the reference
    var plY = MW+4.5+0.65;
    var longDefs = [
      // [x, z, rotY, w, d]   outer ring near palisade
      [ 6.0,  2.2, 0.4,  3.4, 1.4],
      [-2.8,  6.0, 2.0,  3.0, 1.3],
      [-6.0,  2.0, 2.5,  3.4, 1.4],
      [-5.8, -2.8, 0.9,  3.0, 1.3],
      [-2.4, -6.2, 0.3,  3.4, 1.4],
      [ 2.8, -5.8, 5.8,  3.0, 1.3],
      [ 6.2, -1.8, 5.2,  3.4, 1.4],

    longDefs.forEach(function(h,hi){
      var lw = new THREE.Mesh(new THREE.BoxGeometry(h[3],1.3,h[4]), fmf(0xf0ddb0));
      lw.position.set(h[0],plY,h[1]); lw.rotation.y=h[2]; lw.castShadow=true; lw.receiveShadow=true; scene.add(lw);
      if (hi===0) tag(lw, loreData.longhouse.world, loreData.longhouse.title, loreData.longhouse.text);
      var lr = new THREE.Mesh(new THREE.CylinderGeometry(0.05,h[4]*1.15,1.0,4,1), fmf(0xcc4a18));
      lr.position.set(h[0],plY+1.15,h[1]); lr.rotation.y=h[2]+Math.PI/4; scene.add(lr);
    });

    // White tents
    var tentMat = fmf(0xf5f0e8);
    var tentPositions = [
      [3.5, 3.8],[-3.2, 3.0],[4.2,-3.5],[-4.0,-3.2],[0.8, 4.5],[-1.0,-4.2],[4.8, 0.5],[-5.0, 0.0]
    ];

        sh.lineTo(Math.cos(a)*outerR, Math.sin(a)*outerR);

      for (var i=steps; i>=0; i--) {

      return sh;

    });
    window.addEventListener('keyup',   function(e){ keys[e.code]=false; });

    window.addEventListener('mousemove', function(e){
      if (!walkMode) return;
      walkYaw   -= e.movementX * 0.002;
      walkPitch  = Math.max(-0.9, Math.min(0.9, walkPitch - e.movementY*0.002));
    });

    function updateWalk() {
      if (!walkMode) return;
      var speed = 0.06;
      var dir = new THREE.Vector3(Math.sin(walkYaw), 0, Math.cos(walkYaw));
      var right = new THREE.Vector3(Math.cos(walkYaw), 0, -Math.sin(walkYaw));
      if (keys['KeyW']||keys['ArrowUp'])    walkPos.addScaledVector(dir,   speed);
      if (keys['KeyS']||keys['ArrowDown'])  walkPos.addScaledVector(dir,  -speed);
      if (keys['KeyA']||keys['ArrowLeft'])  walkPos.addScaledVector(right, -speed);
      if (keys['KeyD']||keys['ArrowRight']) walkPos.addScaledVector(right,  speed);
      // clamp to island boundary
      var flatDist = Math.sqrt(walkPos.x*walkPos.x + walkPos.z*walkPos.z);
      if (flatDist > 15) { walkPos.x *= 15/flatDist; walkPos.z *= 15/flatDist; flatDist = 15; }

      // ground height follows mound cone: base r=9 y=0, top r=6 y=4.5, plateau inside r=6
      var groundY;
      if (flatDist <= 8.0) {
        groundY = MW + 4.5;
      } else if (flatDist >= 10.8) {
        groundY = MW;
      } else {
        groundY = MW + 4.5 * (10.8 - flatDist) / (10.8 - 8.0);
      }
      walkPos.y = groundY + 0.5;
      cam.position.copy(walkPos);
      var lookAt = new THREE.Vector3(
        walkPos.x + Math.sin(walkYaw)*Math.cos(walkPitch),
        walkPos.y + Math.sin(walkPitch),
        walkPos.z + Math.cos(walkYaw)*Math.cos(walkPitch)
      );
      cam.lookAt(lookAt);
    }

    // ── ORBIT CONTROLS ──────────────────────────────────
    var drag=false, px=0, py=0;
    rend.domElement.addEventListener('mousedown', function(e){
      if (walkMode) return;
      drag=true; px=e.clientX; py=e.clientY;
    });
    window.addEventListener('mouseup', function(){ drag=false; });
    window.addEventListener('mousemove', function(e){
      if (walkMode || !drag) return;
      th -= (e.clientX-px)*0.008; px=e.clientX;
      ph = Math.max(0.15, Math.min(1.45, ph+(e.clientY-py)*0.008)); py=e.clientY;
      tTh=th; tPh=ph; updCam();
    });
    rend.domElement.addEventListener('wheel', function(e){
      if (walkMode) return;
      tRd = Math.max(8, Math.min(90, tRd+e.deltaY*0.06));
    }, {passive:true});

    // Touch support
    var lastTouch = null;
    rend.domElement.addEventListener('touchstart', function(e){ lastTouch=e.touches[0]; });
    rend.domElement.addEventListener('touchmove', function(e){
      if (walkMode) return;
      e.preventDefault();
      var t2=e.touches[0];
      th -= (t2.clientX-lastTouch.clientX)*0.008;
      ph = Math.max(0.15, Math.min(1.45, ph+(t2.clientY-lastTouch.clientY)*0.008));
      tTh=th; tPh=ph; lastTouch=t2; updCam();
    }, {passive:false});

    // ── LOOP ────────────────────────────────────────────
    var t = 0;
    (function loop(){
      requestAnimationFrame(loop); t+=0.008;
      if (walkMode) {
        updateWalk();
      } else {
        th+=(tTh-th)*0.06; ph+=(tPh-ph)*0.06; rd+=(tRd-rd)*0.06; lookY+=(tLookY-lookY)*0.06;
        updCam();
      }
      skyL.intensity   = 1.6 + 0.4*Math.sin(t*0.8);
      grMat.opacity    = 0.3 + 0.1*Math.sin(t*0.6);
      fireL.intensity  = 4.0 + 1.2*Math.sin(t*1.3);
      waterL.intensity = 2.5 + 0.7*Math.sin(t*0.9+1.0);
      rL1.intensity    = 1.8 + 0.5*Math.sin(t*1.4+0.5);
      rL2.intensity    = 1.8 + 0.5*Math.sin(t*1.1+1.5);
      eL1.intensity    = 1.3 + 0.6*Math.sin(t*2.1);
      eL2.intensity    = 1.0 + 0.4*Math.sin(t*1.8+0.7);
      fpL.intensity    = 2.0 + 0.7*Math.sin(t*2.8);
      mwFireL.intensity  = 3.5 + 1.2*Math.sin(t*3.1+0.4);
      mwFireL2.intensity = 1.5 + 0.8*Math.sin(t*2.7+1.1);
      // animate smoke rising
      var sp=smokePosAttr.array;
      for (var si=0; si<smokeCount; si++) {
        var ph2=smokePhase[si]; var life=(t*0.4+ph2)%(Math.PI*2);
        var rise=life/(Math.PI*2)*5.5;
        var spread=rise*0.25;
        sp[si*3]   = smokeOff[si*2]   + Math.sin(t*0.9+ph2)*spread;
        sp[si*3+1] = fireBase+0.5+rise;
        sp[si*3+2] = smokeOff[si*2+1] + Math.cos(t*0.7+ph2)*spread;
      }
      smokePosAttr.needsUpdate=true;
      smokeMesh.material.opacity=0.28+0.07*Math.sin(t*0.5);
      waterMat.emissiveIntensity = 0.8 + 0.3*Math.sin(t*0.7);
      uwMistMat.opacity = 0.3 + 0.1*Math.sin(t*0.9);
      rend.render(scene, cam);
    })();
  })();
  </script>

  <style>
    #gate-editor {
      position:fixed; bottom:16px; left:16px; z-index:200;
      background:rgba(20,14,6,0.88); border:1px solid #7a4820;
      border-radius:8px; padding:12px 16px; color:#f0d890; font:13px/1.6 monospace;
      min-width:220px; user-select:none;
    }
    #gate-editor summary { cursor:pointer; font-weight:bold; letter-spacing:.04em; }
    #gate-editor label { display:flex; justify-content:space-between; align-items:center; gap:8px; margin:4px 0; }
    #gate-editor input[type=range] { width:120px; accent-color:#c8882a; }
    #gate-editor span.val { min-width:40px; text-align:right; color:#ffd870; }
    #gate-editor button { margin-top:8px; width:100%; background:#5a3010; border:1px solid #9a6030;
      color:#f0d890; border-radius:4px; padding:4px; cursor:pointer; font:12px monospace; }
    #gate-editor button:hover { background:#7a4820; }
  </style>

  <details id="gate-editor" style="display:none">
    <summary>⚙ Gate editor</summary>
    <label>X <input type="range" id="ge-x" min="-8" max="8" step="0.05" value="3.57"> <span class="val" id="ge-xv">3.57</span></label>
    <label>Z <input type="range" id="ge-z" min="2" max="10" step="0.05" value="6.69"> <span class="val" id="ge-zv">6.69</span></label>
    <label>Rot <input type="range" id="ge-r" min="-1.6" max="1.6" step="0.01" value="-0.49"> <span class="val" id="ge-rv">-0.49</span></label>
    <button id="ge-copy">Copy values to console</button>
  </details>

  <script>
  (function(){
    function upd(){
      var g=window._ugGroup; if(!g) return;
      var x=+document.getElementById('ge-x').value;
      var z=+document.getElementById('ge-z').value;
      var r=+document.getElementById('ge-r').value;
      g.position.set(x, g.position.y, z);
      g.rotation.y = r;
      document.getElementById('ge-xv').textContent=x.toFixed(2);
      document.getElementById('ge-zv').textContent=z.toFixed(2);
      document.getElementById('ge-rv').textContent=r.toFixed(2);
    }
    ['ge-x','ge-z','ge-r'].forEach(function(id){
      document.getElementById(id).addEventListener('input', upd);
    });
    document.getElementById('ge-copy').addEventListener('click', function(){
      var x=document.getElementById('ge-x').value;
      var z=document.getElementById('ge-z').value;
      var r=document.getElementById('ge-r').value;
      console.log('Gate: x='+x+' z='+z+' rot='+r);
      alert('Logged to console:\nx='+x+'  z='+z+'  rot='+r);
    });
  })();
  </script>
