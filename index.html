<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Baltic Mythological World</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #b4c8cc; font-family: sans-serif; overflow: hidden; }
    #vc { width: 100vw; height: 100vh; display: block; }
    #ui {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; align-items: center;
    }
    button {
      background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.4);
      color: #fff; padding: 8px 18px; border-radius: 20px; cursor: pointer;
      font-size: 14px; backdrop-filter: blur(6px); transition: background 0.2s;
    }
    button:hover { background: rgba(255,255,255,0.32); }
    #label {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.7); font-size: 13px; letter-spacing: 0.08em;
      text-transform: uppercase; pointer-events: none;
    }
    #walk-overlay {
      display: none; position: fixed; inset: 0;
      align-items: center; justify-content: center; flex-direction: column; gap: 12px;
      background: rgba(0,0,0,0.45);
    }
    #walk-overlay.visible { display: flex; }
    #walk-overlay p { color: #fff; font-size: 15px; letter-spacing: 0.06em; text-align: center; line-height: 1.8; }
    #crosshair {
      display: none; position: fixed;
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      width: 20px; height: 20px; pointer-events: none;
    }
    #crosshair::before, #crosshair::after {
      content:''; position: absolute; background: rgba(255,255,255,0.75);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }
    #crosshair.visible { display: block; }
    #walk-hint {
      display: none; position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.55); font-size: 12px; letter-spacing: 0.05em;
      pointer-events: none; text-align: center;
    }
    #walk-hint.visible { display: block; }
  </style>
</head>
<body>
  <div id="vc"></div>
  <div id="label">Drag to rotate &nbsp;·&nbsp; Scroll to zoom</div>
  <div id="ui">
    <button onclick="goUpper()">Sky world</button>
    <button onclick="goMiddle()">Hillfort</button>
    <button onclick="goLower()">Underworld</button>
    <button onclick="goAll()">All three</button>
    <button onclick="enterWalk()" id="walkBtn">Walk inside</button>
  </div>
  <div id="walk-overlay">
    <p>WASD — move &nbsp;·&nbsp; Mouse — look<br>Click to start &nbsp;·&nbsp; Esc to exit</p>
    <button onclick="requestLock()">Click to enter</button>
  </div>
  <div id="crosshair"></div>
  <div id="walk-hint">WASD to move &nbsp;·&nbsp; Esc to exit walk mode</div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
  (function(){
    var el = document.getElementById('vc');
    var W = window.innerWidth, H = window.innerHeight;

    var rend = new THREE.WebGLRenderer({antialias:true});
    rend.setSize(W, H);
    rend.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    rend.shadowMap.enabled = true;
    rend.shadowMap.type = THREE.VSMShadowMap;
    rend.toneMapping = THREE.ACESFilmicToneMapping;
    rend.toneMappingExposure = 0.55;
    rend.outputEncoding = THREE.sRGBEncoding;
    rend.setClearColor(0xb4c8cc, 1);
    el.appendChild(rend.domElement);

    var scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0xb4c8cc, 55, 110);

    var cam = new THREE.PerspectiveCamera(50, W/H, 0.1, 300);
    var th=0.9, ph=1.05, rd=62, tTh=0.9, tPh=1.05, tRd=62;
    var lookY=5, tLookY=5;

    function updCam() {
      cam.position.set(
        rd*Math.sin(ph)*Math.sin(th),
        rd*Math.cos(ph),
        rd*Math.sin(ph)*Math.cos(th)
      );
      cam.lookAt(0, lookY, 0);
    }
    updCam();

    window.goAll    = function(){ tTh=0.9;  tPh=1.05; tRd=62; tLookY=5;   };
    window.goUpper  = function(){ tTh=0.7;  tPh=0.6;  tRd=40; tLookY=24;  };
    window.goMiddle = function(){ tTh=0.85; tPh=0.88; tRd=26; tLookY=3;   };
    window.goLower  = function(){ tTh=0.5;  tPh=1.35; tRd=30; tLookY=-14; };

    window.addEventListener('resize', function(){
      W = window.innerWidth; H = window.innerHeight;
      cam.aspect = W/H; cam.updateProjectionMatrix();
      rend.setSize(W, H);
    });

    function fmf(c) {
      return new THREE.MeshPhongMaterial({color:c, flatShading:true, shininess:0});
    }
    function bm(c, op) {
      var m = new THREE.MeshBasicMaterial({color:c});
      if (op !== undefined) { m.transparent=true; m.opacity=op; }
      return m;
    }

    // ── LIGHTS ──────────────────────────────────────────
    scene.add(new THREE.HemisphereLight(0x4dc1ff, 0xffdca8, 0.5));
    scene.add(new THREE.AmbientLight(0xa68195, 0.35));
    var sun = new THREE.DirectionalLight(0xffd1d1, 3.5);
    sun.position.set(14, 18, 10); sun.castShadow = true;
    sun.shadow.mapSize.width = 2048; sun.shadow.mapSize.height = 2048;
    sun.shadow.camera.left=-28; sun.shadow.camera.right=28;
    sun.shadow.camera.top=28; sun.shadow.camera.bottom=-28;
    sun.shadow.radius = 3;
    scene.add(sun);

    var fireL  = new THREE.PointLight(0xff5500, 5.0, 34); fireL.position.set(0,-16,0);   scene.add(fireL);
    var waterL = new THREE.PointLight(0x0066dd, 3.0, 28); waterL.position.set(0,-17,0);  scene.add(waterL);
    var rL1    = new THREE.PointLight(0x00aacc, 2.0, 20); rL1.position.set(7,-14,4);     scene.add(rL1);
    var rL2    = new THREE.PointLight(0x3300cc, 2.0, 20); rL2.position.set(-7,-14,-4);   scene.add(rL2);
    var eL1    = new THREE.PointLight(0xff6600, 1.5, 12); eL1.position.set(5,-19,5);     scene.add(eL1);
    var eL2    = new THREE.PointLight(0xff3300, 1.2, 10); eL2.position.set(-6,-20,-4);   scene.add(eL2);
    var fpL    = new THREE.PointLight(0xff8800, 2.5, 10); fpL.position.set(0,5.5,0);     scene.add(fpL);
    var skyL   = new THREE.PointLight(0xffd700, 1.8, 60); skyL.position.set(0,30,0);     scene.add(skyL);

    // ── TRUNK (world tree axis) ──────────────────────────
    [[0.45,0.65,7,0x3a6040,-17],[0.35,0.45,11,0x2e5035,-7.5],[0.25,0.35,13,0x224030,3]].forEach(function(s){
      var m = new THREE.Mesh(new THREE.CylinderGeometry(s[0],s[1],s[2],8,1), fmf(s[3]));
      m.position.y = s[4]+s[2]/2; m.castShadow=true; scene.add(m);
    });
    [0, 18].forEach(function(y, i){
      var r = new THREE.Mesh(new THREE.TorusGeometry(1.1,0.14,6,24), bm(i===0?0x00ffcc:0xffd700, 0.85));
      r.position.y = y; scene.add(r);
    });

    // ── UNDERWORLD ──────────────────────────────────────
    var UW = -18;
    [[16,0.8,0x1a0e14],[13,0.7,0x140a10],[10,0.6,0x100810]].forEach(function(d,i){
      var layer = new THREE.Mesh(new THREE.CylinderGeometry(d[0]-i,d[0],d[1],10,1), fmf(d[2]));
      layer.position.y = UW-0.4-i*0.5; scene.add(layer);
    });
    var waterMat = new THREE.MeshPhongMaterial({
      color:0x08102a, emissive:0x001a55, emissiveIntensity:1.0,
      flatShading:true, shininess:120, transparent:true, opacity:0.9
    });
    var waterMesh = new THREE.Mesh(new THREE.CircleGeometry(15,12), waterMat);
    waterMesh.rotation.x=-Math.PI/2; waterMesh.position.y=UW+0.05; scene.add(waterMesh);

    var poolGlow = new THREE.Mesh(new THREE.CircleGeometry(3,10), bm(0x0033cc,0.55));
    poolGlow.rotation.x=-Math.PI/2; poolGlow.position.y=UW+0.08; scene.add(poolGlow);

    [[5,5],[-5,-3],[3,8],[-8,2],[6,-7]].forEach(function(p){
      var em = new THREE.Mesh(new THREE.CircleGeometry(0.7,7), bm(0xff4400,0.85));
      em.rotation.x=-Math.PI/2; em.position.set(p[0],UW+0.1,p[1]); scene.add(em);
      var h2 = new THREE.Mesh(new THREE.CircleGeometry(1.5,7), bm(0xff2200,0.2));
      h2.rotation.x=-Math.PI/2; h2.position.set(p[0],UW+0.09,p[1]); scene.add(h2);
    });

    // Roots — sweeping ribbon curves from trunk down to water
    var ribbonCols=[0x3a4acc,0x2a6aaa,0x1a88aa,0x4a3aaa,0x226688,0x5a3a99,0x1a7799,0x3355bb,0x2a5599,0x446688];
    function makeRibbon(pts, col, w) {
      var curve=new THREE.CatmullRomCurve3(pts);
      var geo=new THREE.TubeGeometry(curve,40,w,3,false);
      var mat=new THREE.MeshPhongMaterial({color:col,flatShading:false,shininess:60,side:THREE.DoubleSide});
      var mesh=new THREE.Mesh(geo,mat);
      mesh.castShadow=true; scene.add(mesh);
    }

    // Sweeping ribbons — more of them, wider spread, organic curves
    // [startAngle, mid1Angle, mid2Angle, endRadius, mid1R, mid1Y, mid2Y, width]
    var sy=-4, ey=UW+0.4;
    var ribbonDefs=[
      [0.0,   0.9,   0.3,  17, 6,  -8,  -13, 1.0],
      [0.5,  -0.3,   0.6,  15, 7,  -9,  -14, 0.8],
      [1.05,  1.8,   1.2,  18, 5,  -7,  -12, 1.1],
      [1.57,  0.8,   1.7,  16, 8,  -10, -15, 0.9],
      [2.1,   2.9,   2.2,  14, 6,  -8,  -13, 1.0],
      [2.6,   1.7,   2.7,  17, 5,  -9,  -14, 0.8],
      [3.14,  3.9,   3.0,  16, 7,  -7,  -12, 1.2],
      [3.67,  4.5,   3.5,  15, 9,  -10, -15, 0.9],
      [4.19,  3.3,   4.3,  18, 6,  -8,  -13, 1.0],
      [4.71,  5.5,   4.6,  14, 7,  -9,  -14, 0.8],
      [5.24,  4.4,   5.1,  17, 5,  -7,  -12, 1.1],
      [5.76,  6.4,   5.6,  16, 8,  -10, -15, 0.9],
      [0.3,   1.2,   0.1,  13, 9,  -8,  -14, 0.7],
      [1.8,   1.0,   2.1,  15, 6,  -9,  -13, 0.7],
      [3.3,   4.1,   3.0,  14, 7,  -7,  -12, 0.7],
      [4.8,   5.8,   4.5,  16, 5,  -10, -15, 0.7]
    ];
    ribbonDefs.forEach(function(d,i){
      var sa=d[0],m1a=d[1],m2a=d[2],endR=d[3],m1r=d[4],m1y=d[5],m2y=d[6],w=d[7];
      makeRibbon([
        new THREE.Vector3(Math.cos(sa)*0.5,    sy,   Math.sin(sa)*0.5),
        new THREE.Vector3(Math.cos(m1a)*m1r,   m1y,  Math.sin(m1a)*m1r),
        new THREE.Vector3(Math.cos(m2a)*endR*0.72, m2y, Math.sin(m2a)*endR*0.72),
        new THREE.Vector3(Math.cos(sa)*endR,   ey,   Math.sin(sa)*endR)
      ], ribbonCols[i%ribbonCols.length], w);
    });

    // Stars in the underworld void
    var uwSp=[];
    for (var i=0; i<300; i++) {
      var ut=Math.random()*Math.PI*2, ur=12+Math.random()*28, uy=UW+Math.random()*16;
      uwSp.push(ur*Math.cos(ut), uy, ur*Math.sin(ut));
    }
    var uwSg=new THREE.BufferGeometry();
    uwSg.setAttribute('position',new THREE.Float32BufferAttribute(uwSp,3));
    scene.add(new THREE.Points(uwSg,new THREE.PointsMaterial({color:0xffffff,size:0.12})));

    // Bioluminescent tips at water level
    for (var i=0; i<10; i++) {
      var da=i/10*Math.PI*2, dr=7+(i%4)*1.2;
      var dot=new THREE.Mesh(new THREE.SphereGeometry(0.2,5,5),bm(i%2===0?0x00eebb:0x4477ff));
      dot.position.set(Math.cos(da)*dr, UW+0.5, Math.sin(da)*dr); scene.add(dot);
    }
    for (var i=0; i<12; i++) {
      var sa=i/12*Math.PI*2, sr=6+(i%4)*1.6, ssw=0.7+(i%3)*0.4, ssh=0.5+(i%4)*0.4;
      var stone = new THREE.Mesh(new THREE.BoxGeometry(ssw,ssh,ssw*0.8), fmf(0x1c1220));
      stone.position.set(Math.cos(sa)*sr, UW+ssh/2, Math.sin(sa)*sr);
      stone.rotation.y=i*0.6; stone.castShadow=true; scene.add(stone);
    }
    var uwMistMat = bm(0x080a18, 0.4);
    var uwMistMesh = new THREE.Mesh(new THREE.CircleGeometry(12,32), uwMistMat);
    uwMistMesh.rotation.x=-Math.PI/2; uwMistMesh.position.y=-0.5; scene.add(uwMistMesh);

    // ── MIDDLE WORLD — HILLFORT ──────────────────────────
    var MW = 0;
    [0xc49058,0xd4a468,0xe0b478,0xeac488].forEach(function(c,i){
      var r2 = 10+i*2.2;
      var layer = new THREE.Mesh(new THREE.CylinderGeometry(r2,r2+2,0.55,14,1), fmf(c));
      layer.position.y = MW-0.28-i*0.45; scene.add(layer);
    });
    var topterra = new THREE.Mesh(new THREE.CircleGeometry(10,14), fmf(0xc49058));
    topterra.rotation.x=-Math.PI/2; topterra.position.y=MW+0.01; scene.add(topterra);
    var ditch = new THREE.Mesh(new THREE.RingGeometry(9.2,10.8,14), fmf(0x8a5a30));
    ditch.rotation.x=-Math.PI/2; ditch.position.y=MW-0.04; scene.add(ditch);

    var mound = new THREE.Mesh(new THREE.CylinderGeometry(6.0,9.0,4.5,10,1), fmf(0x60a030));
    mound.position.y=MW+2.25; mound.castShadow=true; mound.receiveShadow=true; scene.add(mound);
    var plat = new THREE.Mesh(new THREE.CircleGeometry(6.0,10), fmf(0x72b83a));
    plat.rotation.x=-Math.PI/2; plat.position.y=MW+4.52; scene.add(plat);

    var pMat = fmf(0x9a6230);
    for (var i=0; i<26; i++) {
      var pa = i/26*Math.PI*2;
      var post = new THREE.Mesh(new THREE.BoxGeometry(0.24,1.5,0.24), pMat);
      post.position.set(Math.cos(pa)*5.8, MW+5.25, Math.sin(pa)*5.8); post.castShadow=true; scene.add(post);
    }
    var railRing = new THREE.Mesh(new THREE.TorusGeometry(5.8,0.12,4,26), fmf(0x7a4820));
    railRing.rotation.x=Math.PI/2; railRing.position.y=MW+5.65; scene.add(railRing);

    [0,Math.PI*0.5,Math.PI,Math.PI*1.5].forEach(function(a){
      var tx=Math.cos(a)*5.7, tz=Math.sin(a)*5.7, ty=MW+4.5;
      var base = new THREE.Mesh(new THREE.BoxGeometry(1.2,2.2,1.2), fmf(0xaa7038));
      base.position.set(tx,ty+1.1,tz); base.castShadow=true; scene.add(base);
      var roof = new THREE.Mesh(new THREE.ConeGeometry(1.0,1.0,4,1), fmf(0x7a4020));
      roof.position.set(tx,ty+2.7,tz); roof.rotation.y=Math.PI/4; scene.add(roof);
    });

    var gty = MW+4.5;
    var gbase = new THREE.Mesh(new THREE.BoxGeometry(2.0,2.8,1.4), fmf(0xba7840));
    gbase.position.set(0,gty+1.4,5.7); gbase.castShadow=true; scene.add(gbase);
    var groof = new THREE.Mesh(new THREE.ConeGeometry(1.3,1.3,4,1), fmf(0x7a4020));
    groof.position.set(0,gty+3.35,5.7); groof.rotation.y=Math.PI/4; scene.add(groof);
    var garch = new THREE.Mesh(new THREE.BoxGeometry(0.8,1.0,0.4), fmf(0x221005));
    garch.position.set(0,gty+0.5,5.18); scene.add(garch);

    // Stairs — wide flat steps going from outer ground up the mound face
    var STEPS = 18;
    for (var i=0; i<STEPS; i++) {
      var t2 = i/(STEPS-1);
      // angle sweeps slightly around the mound face
      var sa3 = 0.0 + t2*0.55;
      // radius goes from outer base inward as we climb
      var sr3 = 9.0 - t2*2.8;
      var stepY = MW + t2*4.5;
      var stepW = 2.0 - t2*0.5;   // steps get slightly narrower near top
      var rp = new THREE.Mesh(new THREE.BoxGeometry(stepW, 0.22, 0.75), fmf(i%2===0?0x9a6a38:0x8a5a28));
      rp.position.set(Math.sin(sa3)*sr3, stepY, Math.cos(sa3)*sr3);
      rp.rotation.y = -sa3;
      rp.castShadow = true; scene.add(rp);
      // small riser face between steps
      if (i < STEPS-1) {
        var rh3 = 4.5/STEPS;
        var riser = new THREE.Mesh(new THREE.BoxGeometry(stepW, rh3, 0.18), fmf(0x7a4a20));
        riser.position.set(Math.sin(sa3)*sr3, stepY+rh3/2, Math.cos(sa3)*sr3 - 0.45);
        riser.rotation.y = -sa3; scene.add(riser);
      }
    }

    [[-2.5,0],[2.2,1.5],[-2.0,-1.2],[0.4,-2.8]].forEach(function(h){
      var lw = new THREE.Mesh(new THREE.BoxGeometry(3.2,1.3,1.5), fmf(0xf0ddb0));
      lw.position.set(h[0],MW+4.5+0.65,h[1]); lw.castShadow=true; lw.receiveShadow=true; scene.add(lw);
      var lr = new THREE.Mesh(new THREE.CylinderGeometry(0.05,1.7,1.0,4,1), fmf(0xcc4a18));
      lr.position.set(h[0],MW+4.5+1.8,h[1]); lr.rotation.y=Math.PI/4; scene.add(lr);
    });

    var fp2 = new THREE.Mesh(new THREE.CircleGeometry(0.5,6), bm(0xff6600,0.9));
    fp2.rotation.x=-Math.PI/2; fp2.position.set(0,MW+4.55,0); scene.add(fp2);

    [[-13,2],[13,-3],[-11,-7],[10,7],[3,13],[-3,-13],[14,4],[-14,-2],[7,-12],[-7,11],[11,11],[-12,-10]].forEach(function(p){
      var tk = new THREE.Mesh(new THREE.CylinderGeometry(0.05,0.2,0.8,5,1), fmf(0x6a4018));
      tk.position.set(p[0],MW+0.4,p[1]); scene.add(tk);
      var t1 = new THREE.Mesh(new THREE.ConeGeometry(1.0,2.6,6,1), fmf(0x2a6820));
      t1.position.set(p[0],MW+2.1,p[1]); t1.castShadow=true; scene.add(t1);
      var t2 = new THREE.Mesh(new THREE.ConeGeometry(0.65,1.8,6,1), fmf(0x347828));
      t2.position.set(p[0],MW+3.3,p[1]); scene.add(t2);
    });

    [[-12,4],[12,-4],[-10,-8],[10,8],[4,-13],[-4,13],[-14,8],[14,-9]].forEach(function(p){
      var ob = new THREE.Mesh(new THREE.BoxGeometry(1.8,1.0,1.4), fmf(0xecd4a0));
      ob.position.set(p[0],MW+0.5,p[1]); ob.castShadow=true; scene.add(ob);
      var or2 = new THREE.Mesh(new THREE.ConeGeometry(1.3,0.9,4,1), fmf(0xc44a18));
      or2.position.set(p[0],MW+1.45,p[1]); or2.rotation.y=Math.PI/4; scene.add(or2);
    });

    var riverMat = new THREE.MeshPhongMaterial({color:0x5a9ab8,emissive:0x1a4466,emissiveIntensity:0.4,flatShading:true,shininess:80});
    for (var i=0; i<8; i++) {
      var rseg = new THREE.Mesh(new THREE.PlaneGeometry(2.0,2.6), riverMat);
      rseg.rotation.x=-Math.PI/2; rseg.rotation.z=i*0.15;
      rseg.position.set(13-i*1.5, MW+0.04, -12+i*2.5); scene.add(rseg);
    }

    // ── UPPER WORLD — TREE CROWN ─────────────────────────
    var SW = 18;

    // The trunk continues up into the crown
    var upperTrunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2,0.28,6,8,1), fmf(0x1a3828));
    upperTrunk.position.y = SW+3; scene.add(upperTrunk);

    // Main branch arms spreading out from trunk top
    var branchCols = [0x1e4a2a,0x2a5a30,0x163820,0x224030];
    var branches = [
      [0, SW+5, 0,  7, SW+7,  4,  0.18, 0.28],
      [0, SW+5, 0, -6, SW+7,  3,  0.18, 0.28],
      [0, SW+5, 0,  4, SW+7, -6,  0.15, 0.24],
      [0, SW+5, 0, -3, SW+6, -7,  0.15, 0.24],
      [0, SW+5, 0,  8, SW+6, -1,  0.12, 0.20],
      [0, SW+5, 0, -7, SW+6, -3,  0.12, 0.20],
      [0, SW+5, 0,  1, SW+6,  8,  0.12, 0.20],
      [0, SW+5, 0, -2, SW+6, -8,  0.10, 0.18]
    ];
    branches.forEach(function(b,i){
      var dx=b[3]-b[0],dy=b[4]-b[1],dz=b[5]-b[2];
      var len=Math.sqrt(dx*dx+dy*dy+dz*dz);
      var br=new THREE.Mesh(new THREE.CylinderGeometry(b[6],b[7],len,6,1),fmf(branchCols[i%4]));
      br.position.set((b[0]+b[3])/2,(b[1]+b[4])/2,(b[2]+b[5])/2);
      var dir=new THREE.Vector3(dx,dy,dz).normalize();
      br.setRotationFromQuaternion(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),dir));
      br.castShadow=true; scene.add(br);
    });

    // Foliage — dense cluster of gold/white/cream spheres forming the canopy mass
    var leafCols=[0xffd700,0xffe860,0xfff8c0,0xffec40,0xfffaaa,0xffd040,0xffeebb,0xffc820];
    var canopyDef=[
      // [x, y, z, radius]  — a wide spread of overlapping spheres
      [0,   SW+10, 0,   5.0],
      [5,   SW+9,  3,   4.0], [-5,  SW+9,  3,   3.8],
      [4,   SW+9, -5,   3.8], [-4,  SW+9, -5,   3.6],
      [7,   SW+8,  0,   3.2], [-7,  SW+8,  0,   3.2],
      [0,   SW+8,  7,   3.2], [0,   SW+8, -7,   3.0],
      [9,   SW+7,  4,   2.8], [-9,  SW+7,  4,   2.6],
      [6,   SW+7, -7,   2.8], [-6,  SW+7, -7,   2.6],
      [3,   SW+12, 2,   3.5], [-3,  SW+12,-2,   3.2],
      [10,  SW+7,  0,   2.2], [-10, SW+7,  0,   2.2],
      [0,   SW+7,  10,  2.2], [0,   SW+7, -10,  2.0],
      [2,   SW+8,  0,   2.5], [-2,  SW+8,  0,   2.5]
    ];
    canopyDef.forEach(function(b,i){
      var s=new THREE.Mesh(new THREE.SphereGeometry(b[3],6,5),fmf(leafCols[i%8]));
      s.position.set(b[0],b[1],b[2]); s.castShadow=true; scene.add(s);
    });

    // Houses nestled IN the canopy — sitting on branch forks
    var housePositions=[
      [6,  SW+8,  3,  0.4],
      [-5, SW+8,  4,  2.0],
      [4,  SW+8, -5,  1.2],
      [-4, SW+7, -4,  3.5],
      [8,  SW+7,  0,  0.8],
      [-7, SW+7, -2,  2.6],
      [1,  SW+9,  7,  1.5]
    ];
    housePositions.forEach(function(h,i){
      var hw=new THREE.Mesh(new THREE.BoxGeometry(1.4,1.6,1.1),fmf(i%2===0?0xf8f4e8:0xfffacc));
      hw.position.set(h[0],h[1],h[2]); hw.rotation.y=h[3]; hw.castShadow=true; scene.add(hw);
      var hr=new THREE.Mesh(new THREE.ConeGeometry(1.1,1.0,4,1),fmf(i%2===0?0xffd700:0xffe84a));
      hr.position.set(h[0],h[1]+1.3,h[2]); hr.rotation.y=h[3]+Math.PI/4; scene.add(hr);
    });

    // Gold glowing ring on trunk entry into canopy
    var grMat = bm(0xffd700, 0.5);
    var goldRingM = new THREE.Mesh(new THREE.TorusGeometry(1.0,0.15,6,24), grMat);
    goldRingM.rotation.x=Math.PI/2; goldRingM.position.y=SW+5.2; scene.add(goldRingM);

    // Clouds around the canopy
    function makeCloud(cx,cy,cz,scale) {
      [[0,0,0,1.8],[1.6,0.3,0,1.4],[-1.5,0.2,0,1.3],[0.6,0.8,0,1.2],[-0.5,0.6,1.2,1.1],[0.4,0.5,-1.3,1.1]].forEach(function(b){
        var sp=new THREE.Mesh(new THREE.SphereGeometry(b[3]*scale,6,5),fmf(0xffffff));
        sp.position.set(cx+b[0]*scale,cy+b[1]*scale,cz+b[2]*scale); scene.add(sp);
      });
    }
    makeCloud(-18, SW+4,  2,  1.6);
    makeCloud( 19, SW+3, -3,  1.5);
    makeCloud(-15, SW+5,  14, 1.3);
    makeCloud( 16, SW+4,  12, 1.4);
    makeCloud( -8, SW+2, -16, 1.2);
    makeCloud(  7, SW+6, -16, 1.3);
    makeCloud(-20, SW+3, -8,  1.1);
    makeCloud( 20, SW+3,  8,  1.2);

    // Gold star particles above
    var sp=[];
    for (var i=0; i<160; i++) {
      var st=Math.random()*Math.PI*2,sph2=Math.random()*Math.PI*0.5,sr4=48+Math.random()*10;
      sp.push(sr4*Math.sin(sph2)*Math.cos(st),sr4*Math.cos(sph2)+20,sr4*Math.sin(sph2)*Math.sin(st));
    }
    var sg=new THREE.BufferGeometry();
    sg.setAttribute('position',new THREE.Float32BufferAttribute(sp,3));
    scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffd700,size:0.3})));

    // ── WALK MODE ───────────────────────────────────────
    var walkMode = false;
    var walkYaw = 0, walkPitch = 0;
    var walkPos = new THREE.Vector3(0, MW+6.2, 9);
    var keys = {};
    var walkOverlay = document.getElementById('walk-overlay');
    var crosshair   = document.getElementById('crosshair');
    var walkHint    = document.getElementById('walk-hint');
    var walkBtn     = document.getElementById('walkBtn');
    var uiEl        = document.getElementById('ui');
    var labelEl     = document.getElementById('label');

    window.enterWalk = function() {
      goMiddle();
      setTimeout(function(){
        walkPos.set(2, MW+6.2, 10);
        walkYaw = Math.PI; walkPitch = 0;
        walkOverlay.classList.add('visible');
      }, 700);
    };

    window.requestLock = function() {
      rend.domElement.requestPointerLock();
    };

    function startWalk() {
      walkMode = true;
      walkOverlay.classList.remove('visible');
      crosshair.classList.add('visible');
      walkHint.classList.add('visible');
      walkBtn.textContent = 'Exit walk';
      walkBtn.onclick = exitWalk;
      uiEl.style.opacity = '0.3';
      labelEl.style.display = 'none';
    }

    window.exitWalk = function() {
      document.exitPointerLock();
      walkMode = false;
      crosshair.classList.remove('visible');
      walkHint.classList.remove('visible');
      walkBtn.textContent = 'Walk inside';
      walkBtn.onclick = enterWalk;
      uiEl.style.opacity = '1';
      labelEl.style.display = '';
      goMiddle();
    };

    document.addEventListener('pointerlockchange', function(){
      if (document.pointerLockElement === rend.domElement) {
        startWalk();
      } else if (walkMode) {
        exitWalk();
      }
    });

    window.addEventListener('keydown', function(e){ keys[e.code]=true;
      if (e.code==='Escape' && walkMode) exitWalk();
    });
    window.addEventListener('keyup',   function(e){ keys[e.code]=false; });

    window.addEventListener('mousemove', function(e){
      if (!walkMode) return;
      walkYaw   -= e.movementX * 0.002;
      walkPitch  = Math.max(-0.9, Math.min(0.9, walkPitch - e.movementY*0.002));
    });

    function updateWalk() {
      if (!walkMode) return;
      var speed = 0.06;
      var dir = new THREE.Vector3(Math.sin(walkYaw), 0, Math.cos(walkYaw));
      var right = new THREE.Vector3(Math.cos(walkYaw), 0, -Math.sin(walkYaw));
      if (keys['KeyW']||keys['ArrowUp'])    walkPos.addScaledVector(dir,   speed);
      if (keys['KeyS']||keys['ArrowDown'])  walkPos.addScaledVector(dir,  -speed);
      if (keys['KeyA']||keys['ArrowLeft'])  walkPos.addScaledVector(right, -speed);
      if (keys['KeyD']||keys['ArrowRight']) walkPos.addScaledVector(right,  speed);
      // clamp to island boundary
      var flatDist = Math.sqrt(walkPos.x*walkPos.x + walkPos.z*walkPos.z);
      if (flatDist > 13) { walkPos.x *= 13/flatDist; walkPos.z *= 13/flatDist; flatDist = 13; }

      // ground height follows mound cone: base r=9 y=0, top r=6 y=4.5, plateau inside r=6
      var groundY;
      if (flatDist <= 6.0) {
        groundY = MW + 4.5;
      } else if (flatDist >= 9.2) {
        groundY = MW;
      } else {
        groundY = MW + 4.5 * (9.2 - flatDist) / (9.2 - 6.0);
      }
      walkPos.y = groundY + 0.5;
      cam.position.copy(walkPos);
      var lookAt = new THREE.Vector3(
        walkPos.x + Math.sin(walkYaw)*Math.cos(walkPitch),
        walkPos.y + Math.sin(walkPitch),
        walkPos.z + Math.cos(walkYaw)*Math.cos(walkPitch)
      );
      cam.lookAt(lookAt);
    }

    // ── ORBIT CONTROLS ──────────────────────────────────
    var drag=false, px=0, py=0;
    rend.domElement.addEventListener('mousedown', function(e){
      if (walkMode) return;
      drag=true; px=e.clientX; py=e.clientY;
    });
    window.addEventListener('mouseup', function(){ drag=false; });
    window.addEventListener('mousemove', function(e){
      if (walkMode || !drag) return;
      th -= (e.clientX-px)*0.008; px=e.clientX;
      ph = Math.max(0.15, Math.min(1.45, ph+(e.clientY-py)*0.008)); py=e.clientY;
      tTh=th; tPh=ph; updCam();
    });
    rend.domElement.addEventListener('wheel', function(e){
      if (walkMode) return;
      tRd = Math.max(8, Math.min(90, tRd+e.deltaY*0.06));
    }, {passive:true});

    // Touch support
    var lastTouch = null;
    rend.domElement.addEventListener('touchstart', function(e){ lastTouch=e.touches[0]; });
    rend.domElement.addEventListener('touchmove', function(e){
      if (walkMode) return;
      e.preventDefault();
      var t2=e.touches[0];
      th -= (t2.clientX-lastTouch.clientX)*0.008;
      ph = Math.max(0.15, Math.min(1.45, ph+(t2.clientY-lastTouch.clientY)*0.008));
      tTh=th; tPh=ph; lastTouch=t2; updCam();
    }, {passive:false});

    // ── LOOP ────────────────────────────────────────────
    var t = 0;
    (function loop(){
      requestAnimationFrame(loop); t+=0.008;
      if (walkMode) {
        updateWalk();
      } else {
        th+=(tTh-th)*0.06; ph+=(tPh-ph)*0.06; rd+=(tRd-rd)*0.06; lookY+=(tLookY-lookY)*0.06;
        updCam();
      }
      skyL.intensity   = 1.6 + 0.4*Math.sin(t*0.8);
      grMat.opacity    = 0.3 + 0.1*Math.sin(t*0.6);
      fireL.intensity  = 4.0 + 1.2*Math.sin(t*1.3);
      waterL.intensity = 2.5 + 0.7*Math.sin(t*0.9+1.0);
      rL1.intensity    = 1.8 + 0.5*Math.sin(t*1.4+0.5);
      rL2.intensity    = 1.8 + 0.5*Math.sin(t*1.1+1.5);
      eL1.intensity    = 1.3 + 0.6*Math.sin(t*2.1);
      eL2.intensity    = 1.0 + 0.4*Math.sin(t*1.8+0.7);
      fpL.intensity    = 2.0 + 0.7*Math.sin(t*2.8);
      waterMat.emissiveIntensity = 0.8 + 0.3*Math.sin(t*0.7);
      uwMistMat.opacity = 0.3 + 0.1*Math.sin(t*0.9);
      rend.render(scene, cam);
    })();
  })();
  </script>
</body>
</html>
